<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>故事另有結局｜黑暗特質心理測驗</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #000000;
  --ink: #ffffff;
  --ink-weak: #a0a0a0;
  --line: rgba(255, 255, 255, 0.25);
  --line-strong: rgba(255, 255, 255, 0.7);
  --muted: rgba(255, 255, 255, 0.4);
  --serif: 'Noto Serif TC', serif;
  --display: 'IM Fell English', serif;

  --content-pad: 48px;
  --maxw: 720px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--serif);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  -webkit-font-smoothing: antialiased;
}

/* =========================================
   ART DECO / MYSTIC FIXED OVERLAYS
   (Matching the reference images)
========================================= */
.art-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
}

/* Top Left Sunburst (Reference Image 3) */
.art-tl {
  position: absolute;
  top: 0; left: 0;
  width: 180px; height: 180px;
}
.art-tl svg { width: 100%; height: 100%; }

/* Bottom Left Moon Compass (Reference Image 2) */
.art-bl {
  position: absolute;
  bottom: 0; left: 0;
  width: 220px; height: 220px;
}
.art-bl svg { width: 100%; height: 100%; }

/* Top Right Pendulum & Star (Reference Image 4) */
.art-tr {
  position: absolute;
  top: 0; right: 0;
  width: 150px; height: 350px;
}
.art-tr svg { width: 100%; height: 100%; }


/* =========================================
   MAIN LAYOUT & CONTAINERS
========================================= */
#app {
  width: 100%;
  max-width: var(--maxw);
  padding: 80px 24px 120px;
  position: relative;
  z-index: 10;
}

/* 內容區 */
.section {
  position: relative;
  padding: 0 var(--content-pad) 64px;
}

/* =========================================
   TYPOGRAPHY & TITLE DECOR (Reference Image 1)
========================================= */
.title-wrap {
  position: relative;
  margin-top: 60px;
  margin-bottom: 40px;
  padding: 40px 0;
  display: flex;
  justify-content: center;
}

.h1 {
  font-family: var(--display);
  font-style: normal;
  font-weight: 400;
  letter-spacing: 2px;
  font-size: 58px;
  line-height: 1.15;
  /* Outline Text Effect */
  color: transparent;
  -webkit-text-stroke: 1px var(--ink);
  text-align: left;
  position: relative;
  z-index: 2;
}

.subtitle {
  margin-top: 16px;
  font-family: var(--serif);
  font-weight: 300;
  font-size: 22px;
  letter-spacing: 6px;
  color: var(--ink);
  text-align: center;
}

.lead {
  margin-top: 36px;
  color: var(--ink-weak);
  line-height: 2.2;
  font-size: 15px;
  font-weight: 300;
  letter-spacing: 2px;
  text-align: center;
}
.lead strong {
  color: var(--ink);
  font-weight: 400;
}

/* Title Decorations (Image 1 Crossbursts) */
.title-deco-left {
  position: absolute;
  left: -20px;
  top: 0;
  width: 80px; height: 220px;
  pointer-events: none;
}
.title-deco-right {
  position: absolute;
  right: -80px;
  top: 10px;
  width: 140px; height: 200px;
  pointer-events: none;
}

/* =========================================
   UI ELEMENTS (Crisp, Flat, High-Contrast)
========================================= */
/* 極簡分隔線 */
.rule {
  margin: 40px auto;
  height: 1px;
  width: 40%;
  background: var(--line);
  position: relative;
}
.rule::after {
  content: "✦";
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  color: var(--ink);
  font-size: 12px;
  background: var(--bg);
  padding: 0 16px;
}

/* 按鈕：高級鋒利線框 */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border: 1px solid var(--ink);
  background: var(--bg);
  color: var(--ink);
  padding: 18px 42px;
  font-family: var(--serif);
  letter-spacing: 4px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  user-select: none;
  border-radius: 0; /* Sharp corners */
  text-transform: uppercase;
}
.btn:hover {
  background: var(--ink);
  color: var(--bg);
}
.btn-row {
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: center;
  margin-top: 32px;
  flex-wrap: wrap;
}
.btn-row .mini {
  padding: 12px 24px;
  font-size: 13px;
  letter-spacing: 3px;
  border-color: var(--line-strong);
  color: var(--ink-weak);
}
.btn-row .mini:hover {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

/* =========================================
   QUIZ SECTION
========================================= */
.meta {
  margin-top: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--muted);
  font-family: var(--display);
  font-style: italic;
  letter-spacing: 2px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 12px;
}
.progress {
  display: flex;
  gap: 4px;
  margin-top: 2px;
}
.seg {
  flex: 1;
  height: 1px;
  background: transparent;
  border-top: 1px dashed var(--line);
  position: relative;
}
.seg.done { border-top-style: solid; border-color: var(--ink); }
.seg.active { border-top-style: solid; border-color: var(--ink-weak); }

.qno {
  margin-top: 60px;
  font-family: var(--display);
  font-style: italic;
  letter-spacing: 6px;
  color: var(--ink-weak);
  font-size: 18px;
  text-align: center;
}
.qtext {
  margin-top: 20px;
  font-size: 20px;
  line-height: 2;
  color: var(--ink);
  font-family: var(--serif);
  letter-spacing: 2px;
  text-align: center;
  font-weight: 300;
}

/* 選項：鋒利排版 */
.options {
  margin-top: 50px;
  border-top: 1px solid var(--ink);
}
.opt {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  color: var(--ink-weak);
  text-align: left;
  padding: 24px 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  gap: 20px;
  align-items: flex-start;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUpOpt 0.4s ease forwards;
}
.opt:nth-child(1) { animation-delay: 0.1s; }
.opt:nth-child(2) { animation-delay: 0.2s; }
.opt:nth-child(3) { animation-delay: 0.3s; }
.opt:nth-child(4) { animation-delay: 0.4s; }

.opt:hover {
  color: var(--ink);
  padding-left: 28px;
  border-bottom-color: var(--ink);
}
.opt:disabled { cursor: default; opacity: 0.3; pointer-events: none; }

.bullet {
  width: 8px; height: 8px;
  border: 1px solid var(--line-strong);
  margin-top: 9px;
  flex: 0 0 auto;
  transform: rotate(45deg); /* Diamond shape */
  transition: all 0.3s ease;
}
.opt:hover .bullet { background: var(--ink); border-color: var(--ink); }
.opt.selected .bullet { background: var(--ink); border-color: var(--ink); transform: rotate(45deg) scale(1.2); }
.opt .txt {
  line-height: 1.8;
  font-size: 16px;
  letter-spacing: 1px;
}

/* =========================================
   RESULT SECTION
========================================= */
.result-img-wrap {
  margin-top: 24px;
  border: 1px solid var(--ink);
  padding: 8px;
  position: relative;
}
.result-img {
  width: 100%;
  height: auto;
  display: block;
  filter: grayscale(100%) contrast(1.2); /* Enhance the dark aesthetic */
}

.result-body { margin-top: 40px; text-align: center; }
.r-eyebrow {
  font-family: var(--display);
  font-style: italic;
  letter-spacing: 4px;
  color: var(--ink-weak);
  font-size: 12px;
  text-transform: uppercase;
}
.r-name {
  margin-top: 16px;
  font-family: var(--serif);
  font-weight: 400;
  font-size: 36px;
  letter-spacing: 4px;
}
.r-desc {
  margin-top: 16px;
  line-height: 2;
  color: var(--ink-weak);
  font-size: 15px;
  letter-spacing: 2px;
}

/* 指標：極簡框線三欄 */
.seals {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px; /* border thickness */
  background: var(--line);
  border: 1px solid var(--line);
}
.seal {
  background: var(--bg);
  padding: 24px 12px;
  position: relative;
}
.seal .lab {
  font-family: var(--display);
  font-style: italic;
  letter-spacing: 2px;
  color: var(--muted);
  font-size: 12px;
}
.seal .val {
  margin-top: 12px;
  font-family: var(--serif);
  color: var(--ink);
  letter-spacing: 2px;
  font-size: 14px;
}

/* Quote / Guide */
.block {
  margin-top: 32px;
  border: 1px solid var(--line);
  padding: 32px 24px;
  position: relative;
  text-align: left;
}
.block::before {
  content: "✦";
  position: absolute;
  top: -8px; left: 24px;
  background: var(--bg);
  padding: 0 8px;
  font-size: 10px;
  color: var(--ink);
}
.block .lab {
  font-family: var(--display);
  font-style: italic;
  letter-spacing: 3px;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.block .txt {
  line-height: 2.2;
  color: var(--ink);
  font-size: 15px;
  letter-spacing: 1.5px;
  font-weight: 300;
}
.block .txt.muted { color: var(--ink-weak); }

/* CTA */
.cta { margin-top: 32px; }
.cta a {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--ink);
  color: var(--ink);
  padding: 20px 24px;
  text-decoration: none;
  letter-spacing: 2px;
  font-size: 14px;
  transition: all 0.3s ease;
  text-transform: uppercase;
}
.cta a::after {
  content: "→";
  font-family: var(--serif);
  transition: transform 0.3s ease;
}
.cta a:hover {
  background: var(--ink);
  color: var(--bg);
}
.cta a:hover::after { transform: translateX(5px); }

/* Footer stats */
.stats {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px dotted var(--line-strong);
  color: var(--muted);
  line-height: 2;
  font-size: 13px;
  letter-spacing: 2px;
  text-align: center;
}
.stats strong { color: var(--ink); font-weight: 400; }

/* 關鍵影格與動畫 */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUpOpt {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.in { animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both; }

/* 小螢幕響應式 */
@media (max-width: 768px){
  :root { --content-pad: 24px; }
  .h1 { font-size: 42px; text-align: center; }
  .title-deco-left { left: 0px; height: 160px; }
  .title-deco-right { right: -20px; height: 140px; }
  .title-wrap { padding: 20px 0; }
  .seals { grid-template-columns: 1fr; }
  .art-layer { opacity: 0.3; } /* Lessen distraction on mobile */
  .btn-row { flex-direction: column; width: 100%; }
  .btn { width: 100%; }
}
</style>
</head>

const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];

/* ========= STATE ========= */
let qi = 0;
let axesScore = {};
AXES.forEach(k => axesScore[k] = 0);

/* ========= UI ========= */
const elIntro  = document.getElementById('intro');
const elQuiz   = document.getElementById('quiz');
const elResult = document.getElementById('result');

const elProgress = document.getElementById('progress');
const elLabel    = document.getElementById('quiz-label');
const elQno      = document.getElementById('qno');
const elQtext    = document.getElementById('qtext');
const elOptions  = document.getElementById('options');

function startQuiz(){
  elIntro.style.display = 'none';
  elResult.style.display = 'none';
  elQuiz.style.display = 'block';
  elQuiz.classList.add('in');

  qi = 0;
  AXES.forEach(k => axesScore[k] = 0);

  // build progress
  elProgress.innerHTML = '';
  for(let i=0;i<questions.length;i++){
    const d = document.createElement('div');
    d.className = 'seg';
    elProgress.appendChild(d);
  }

  showQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
}

function updateProgress(){
  const segs = document.querySelectorAll('.seg');
  segs.forEach((s, idx) => {
    s.classList.remove('done','active');
    if(idx < qi) s.classList.add('done');
    else if(idx === qi) s.classList.add('active');
  });

  elLabel.textContent = `Question ${ROMAN[qi]} of ${ROMAN[questions.length-1]}`;
  elQno.textContent = `— ${ROMAN[qi]} —`;
}

function showQuestion(){
  updateProgress();
  const q = questions[qi];

  // 加入淡入動畫重置
  elQtext.style.animation = 'none';
  elQtext.offsetHeight; /* trigger reflow */
  elQtext.style.animation = 'fadeUp 0.5s ease both';
  elQtext.textContent = q.text;

  elOptions.innerHTML = '';
  q.options.forEach((opt) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.type = 'button';
    btn.innerHTML = `<span class="bullet"></span><span class="txt">${opt.text}</span>`;
    btn.onclick = () => pick(opt.add, btn);
    elOptions.appendChild(btn);
  });
}

function addAxisScores(obj){
  for(const k in obj){
    if(Object.prototype.hasOwnProperty.call(axesScore, k)){
      axesScore[k] += obj[k];
    }
  }
}

function pick(addObj, btn){
  // lock
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  btn.classList.add('selected');
  addAxisScores(addObj);

  setTimeout(()=>{
    qi++;
    if(qi < questions.length) showQuestion();
    else showResult();
  }, 400);
}

/* ========= RESULT LOGIC ========= */
function determineResultKey(){
  const {dom,sub,control,manip,chaos,devotion} = axesScore;
  const diff = dom-sub;
  const stance = diff>=2 ? "dom" : diff<=-2 ? "sub" : "switch";
  const secondary = [
    {k:"control",v:control},{k:"manip",v:manip},{k:"chaos",v:chaos},{k:"devotion",v:devotion}
  ].sort((a,b)=>b.v-a.v)[0].k;

  const veryChaos = chaos>=7, veryControl=control>=7, veryManip=manip>=7, veryDevotion=devotion>=7;

  if(veryChaos && sub>=dom)  return "病態攻 × 斯德哥爾摩受";
  if(veryChaos && dom>sub)   return "無情獸群攻 × 自毀抹布受";
  if(veryManip || (secondary==="manip" && manip>=5)) return "腹黑勢利攻 × 卑劣淫蕩受";
  if(veryControl || (secondary==="control" && control>=5)){
    if(stance==="sub" || devotion>=6) return "佔有囚禁攻 × 自願沉淪受";
    if(chaos>=5) return "黑化掠奪攻 × 清冷自持受";
    return "陰鬱偏執攻 × 陽光直男受";
  }
  if(veryDevotion || (secondary==="devotion" && devotion>=5)){
    if(stance==="dom") return "二哈黑龍攻 × 人妻王子受";
    return "佔有囚禁攻 × 自願沉淪受";
  }
  if(stance==="dom") return chaos>=5 ? "暴力黑獅攻 × 冰山白神攻" : "陰鬱偏執攻 × 陽光直男受";
  if(stance==="sub") return control>=4 ? "偏執瘋子攻 × 廢物美人受" : "放蕩影子攻 × 禁慾學者受";
  return chaos>=5 ? "暴力黑獅攻 × 冰山白神攻" : "放蕩影子攻 × 禁慾學者受";
}

function showResult(){
  elQuiz.style.display = 'none';
  elIntro.style.display = 'none';
  elResult.style.display = 'block';

  // 重置動畫
  elResult.classList.remove('in');
  void elResult.offsetWidth;
  elResult.classList.add('in');

  const key = determineResultKey();
  const r = resultsData[key];

  document.getElementById('result-img').src = r.image;
  document.getElementById('r-name').textContent = `【${r.soulName}】`;
  document.getElementById('r-desc').textContent = r.soulDesc;
  document.getElementById('r-quote').textContent = r.quote;
  document.getElementById('r-guide').textContent = r.guide;

  // seals
  const seals = document.getElementById('seals');
  seals.innerHTML = `
    <div class="seal">
      <div class="lab">危險指數</div>
      <div class="val">${r.danger}</div>
    </div>
    <div class="seal">
      <div class="lab">${r.attr}</div>
      <div class="val">${r.attrVal}</div>
    </div>
    <div class="seal">
      <div class="lab">逃脫機率</div>
      <div class="val">${r.escape}</div>
    </div>
  `;

  // CTA
  const cta = document.getElementById('r-cta');
  cta.innerHTML = `
    <a href="${r.link}" target="_blank" rel="noopener">
      <span>解鎖你的故事樣本：${r.bookName}</span>
    </a>
  `;

  // stats
  sendStats(key);

  window.scrollTo({top:0, behavior:'smooth'});
}

function sendStats(key){
  const stats = document.getElementById('stats');
  if(GAS_URL==="在此貼上你的_GAS_網址"){
    stats.textContent = "✦ 尚未串接資料庫，僅顯示本地結果。";
    return;
  }
  fetch(`${GAS_URL}?result=${encodeURIComponent(key)}`)
    .then(r=>r.json())
    .then(data=>{
      if(data.status==="success"){
        const uc = data.stats[key] || 1;
        const pct = ((uc/data.total)*100).toFixed(1);
        stats.innerHTML = `✦ 目前共有 <strong>${data.total}</strong> 個靈魂墜入深淵。與你同類的人約佔 <strong>${pct}%</strong>。`;
      } else {
        stats.textContent = "✦ 數據讀取失敗，但深淵已記住你的選擇。";
      }
    })
    .catch(()=>{
      stats.textContent = "✦ 數據讀取失敗，但深淵已記住你的選擇。";
    });
}

function copyResult(){
  const name = document.getElementById('r-name').textContent || '';
  const desc = document.getElementById('r-desc').textContent || '';
  const quote = document.getElementById('r-quote').textContent || '';
  const text = `${name}\n${desc}\n\n「${quote}」`;
  navigator.clipboard.writeText(text).then(()=>{
    alert('已成功複製結果，快去和朋友分享你的黑暗特質吧！');
  }).catch(()=>{
    alert('複製失敗，請手動複製');
  });
}
