<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>故事另有結局｜黑暗特質心理測驗</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<meta name="description" content="這是一場關於支配、臣服、算計與破壞的深層試煉。來測測看你在黑暗童話裡，會走向哪種結局？">
<meta name="keywords" content="心理測驗,黑暗特質,故事結局,BL,測驗">
<meta name="author" content="九楠,火登,君羊,兌現藍,吳墨,相對之下,悠然,喵芭渴死姬,葦,蘇朵拉">

<meta property="og:type" content="website">
<meta property="og:title" content="故事另有結局｜黑暗特質心理測驗">
<meta property="og:description" content="這是一場關於支配、臣服、算計與破壞的深層試煉。來測測看你的專屬結局！">
<meta property="og:url" content="https://tealize-write.github.io/DarkBLstory/">
<meta property="og:image" content="https://tealize-write.github.io/DarkBLstory/og-image.jpg">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="故事另有結局｜黑暗特質心理測驗">
<meta name="twitter:description" content="這是一場關於支配、臣服、算計與破壞的深層試煉。">
<meta name="twitter:image" content="https://tealize-write.github.io/DarkBLstory/og-image.jpg">

<link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

<!-- ══ BACKGROUND AUDIO ══ -->
<audio id="bgm" src="sonican-enchanted-fantasy-Music_by_Dvir_Silverstone_from_Pixabay.mp3" loop preload="auto" autoplay></audio>

<!-- ══ SVG SPRITE（隱藏，僅定義圖形） ══ -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>

    <!--
      羅盤原型：viewBox 座標系 220×220
      月亮中心 (60,160)，水平線往右延伸，垂直線往下
    -->
    <symbol id="compass" viewBox="0 0 220 220" overflow="visible">
      <!-- 月亮雙圓環 -->
      <circle cx="60" cy="160" r="38" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="60" cy="160" r="30" fill="none" stroke="currentColor" stroke-width="1"/>
      <!-- 月牙（右側缺口） -->
      <path d="M45,160 A15,15 0 1,1 75,160 A18,18 0 1,0 45,160" fill="currentColor"/>
      <!-- 上方星形指針（朝上） -->
      <polygon points="60,105 62,115 70,117 62,119 60,129 58,119 50,117 58,115" fill="currentColor"/>
      <circle cx="60" cy="100" r="2" fill="currentColor"/>
      <!-- 水平線往右 -->
      <line x1="98" y1="160" x2="220" y2="160" stroke="currentColor" stroke-width="1.2"/>
      <!-- 垂直線往下 -->
      <line x1="60" y1="198" x2="60" y2="220" stroke="currentColor" stroke-width="1.2"/>
      <!-- 水平線刻度裝飾 -->
      <circle cx="104" cy="160" r="3" fill="currentColor"/>
      <path d="M125,156 L130,160 L125,164" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <path d="M132,156 L137,160 L132,164" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <line x1="160" y1="156" x2="160" y2="164" stroke="currentColor" stroke-width="1.5"/>
      <line x1="156" y1="160" x2="164" y2="160" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="210" cy="160" r="4" fill="currentColor"/>
      <!-- 垂直線末端星形裝飾 -->
      <polygon points="60,205 62,208 65,210 62,212 60,215 58,212 55,210 58,208" fill="currentColor"/>
    </symbol>

  </defs>
</svg>

<!-- ══ ART DECO OVERLAYS ══ -->
<!-- aria-hidden 只加在裝飾層，按鈕單獨設定 -->
<!-- ART DECO OVERLAYS -->
<div class="art-layer" aria-hidden="true">
  <div class="art-bl"><svg viewBox="0 0 220 220"><use href="#compass"/></svg></div>
  <div class="art-tr"><svg viewBox="0 0 220 220"><use href="#compass" transform="translate(220,220) scale(-1,-1)"/></svg></div>
</div><!-- /art-layer -->

<!-- AUDIO CONTROLS (outside art-layer) -->
<button id="audio-btn" type="button" aria-label="切換音樂" onclick="toggleAudio()">
  <div class="audio-icon-wrap">
    <svg class="icon-bars" viewBox="0 0 18 18" fill="none">
      <rect class="bar1" x="2" y="7" width="2.2" height="5.5" rx=".6" fill="currentColor" style="transform-origin:3.1px 12.5px"/>
      <rect class="bar2" x="7.9" y="4" width="2.2" height="8.5" rx=".6" fill="currentColor" style="transform-origin:9px 12.5px"/>
      <rect class="bar3" x="13.8" y="7" width="2.2" height="5.5" rx=".6" fill="currentColor" style="transform-origin:14.9px 12.5px"/>
    </svg>
    <svg class="icon-note" viewBox="0 0 18 18" fill="none">
      <ellipse cx="6.5" cy="14" rx="3" ry="2.2" transform="rotate(-15 6.5 14)" fill="currentColor"/>
      <line x1="9.3" y1="13" x2="9.3" y2="3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M9.3,3.5 C12.5,4.8 13.2,7.5 11,9.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="2" y1="16" x2="16" y2="2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </div>
</button>
<div id="audio-hint" aria-hidden="true">建議開啟BGM體驗更佳</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- ── INTRO ── -->
  <section id="intro" class="section in">

    <!-- Banner -->
    <div class="banner-wrap">
      <img src="https://framerusercontent.com/images/U9tml45l5qnasVf4dveA1xGFc.png" alt="故事另有結局"/>
      <div class="banner-caption">Dark Trait Analysis</div>
    </div>

    <!-- Title -->
    <div class="title-wrap">
      <svg class="title-deco-left" viewBox="0 0 80 220">
        <line x1="40" y1="0" x2="40" y2="170" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="40" cy="80" r="6" fill="currentColor"/>
        <path d="M40,150 Q40,170 15,170 Q40,170 40,190 Q40,170 65,170 Q40,170 40,150" fill="currentColor"/>
        <line x1="0" y1="170" x2="80" y2="170" stroke="currentColor" stroke-width="1"/>
      </svg>
      <div class="h1">How will<br>the story end<br>this time?</div>
      <svg class="title-deco-right" viewBox="0 0 140 210">
        <path d="M90,30 Q90,60 55,60 Q90,60 90,90 Q90,60 125,60 Q90,60 90,30" fill="currentColor"/>
        <line x1="0" y1="60" x2="140" y2="60" stroke="currentColor" stroke-width="1"/>
        <line x1="115" y1="60" x2="115" y2="185" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="115" cy="191" r="4" fill="none" stroke="currentColor" stroke-width="1"/>
        <circle cx="115" cy="204" r="4" fill="none" stroke="currentColor" stroke-width="1"/>
      </svg>
    </div>

    <div class="subtitle">你又會有怎樣的故事？</div>
    <div class="rule"></div>

    <p class="lead">
      每個人心裡都藏著一個<strong>不能說出口的偏好</strong>。<br/>
      有人嚮往溫柔，有人沉迷失控。<br/>
      有人渴望被征服，有人其實想掌控一切。
    </p>
    <p class="lead">
      這是一場關於<strong>支配、臣服、算計與破壞</strong>的深層試煉。<br/>
      請用直覺回答，別想太多。
    </p>

    <div class="btn-row" style="margin-top:50px;">
      <button class="btn" type="button" onclick="startQuiz()">深入黑森林</button>
    </div>
  </section>

  <!-- ── QUIZ ── -->
  <section id="quiz" class="section hidden">
    <!-- 左上返回箭頭 -->
    <button class="back-btn" type="button" onclick="confirmRestart()" aria-label="重新開始">
      <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.2">
        <polyline points="11,3 5,9 11,15"/>
        <line x1="5" y1="9" x2="16" y2="9"/>
      </svg>
      重新開始
    </button>
    <div class="meta">
      <div id="quiz-label">Question I of VIII</div>
      <div>Choose by instinct</div>
    </div>
    <div class="progress" id="progress"></div>
    <div class="qno" id="qno">— I —</div>
    <div class="qtext" id="qtext"></div>
    <div class="options" id="options"></div>
    <!-- Skip 按鈕：打字機進行中才顯示 -->
    <div id="skip-wrap" style="text-align:right;margin-top:16px;display:none;">
      <button class="skip-btn" type="button" id="skip-btn" onclick="skipTypewriter()">
        skip ››
      </button>
    </div>
  </section>

  <!-- ── RESULT ── -->
  <section id="result" class="section hidden">

    <!-- 上半：圖＋基本資訊並排 -->
    <div class="result-hero in">
      <div class="result-img-wrap">
        <img id="result-img" class="result-img" src="" alt="結果圖"/>
      </div>
      <div class="result-hero-info">
        <div class="r-eyebrow">揭曉黑暗特質</div>
        <div class="r-name" id="r-name"></div>
        <div class="r-compound" id="r-compound"></div>
        <div class="r-desc" id="r-desc"></div>
      </div>
    </div>

    <div class="result-body in" style="animation-delay:.2s;">

      <div class="seals" id="seals"></div>

      <div class="block">
        <div class="lab">專屬台詞</div>
        <div class="txt" id="r-quote" style="font-style:italic;"></div>
      </div>

      <div class="block">
        <div class="lab">黑暗印痕</div>
        <div class="txt muted" id="r-guide"></div>
        <div class="cta" id="r-cta"></div>
      </div>

      <div class="stats" id="stats">
        <div id="my-axes"></div>
        <div id="pop-chart"></div>
        <div id="pop-line" style="margin-top:12px;">✦ 正在讀取深淵數據⋯</div>
      </div>

      <div class="btn-row" style="margin-top:40px;">
        <button class="btn" type="button" onclick="location.reload()">回到黑森林</button>
        <button class="btn mini" type="button" onclick="shareResultAsImage()">儲存並分享結果</button>
      </div>
    </div>

  </section>

</div><!-- /app -->


<!-- ══ SCRIPTS ══ -->
<script defer src="./config.js"></script>
<script defer src="./results.js"></script>
<script defer src="./questions.js"></script>
<script defer src="./ui.js"></script>
<script defer src="./stats.js"></script>
<script defer src="./audio.js"></script>
<script defer src="./engine.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
