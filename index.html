<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>故事另有結局｜黑暗特質心理測驗</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet" />

<style>
:root{
  --bg:#000;
  --ink:#fff;
  --ink-weak:rgba(255,255,255,.75);
  --line:rgba(255,255,255,.18);
  --line-strong:rgba(255,255,255,.32);
  --muted:rgba(255,255,255,.55);
  --muted2:rgba(255,255,255,.35);
  --serif:'Noto Serif TC', serif;
  --display:'IM Fell English', serif;

  --rail:22px;       /* 左右導線距離邊緣 */
  --content-pad:42px;
  --maxw:820px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--serif);
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

/* 主舞台 */
#app{
  width:100%;
  max-width:var(--maxw);
  padding: 28px 14px 96px;
  position:relative;
}

/* 外框：極簡畫冊導線 */
.frame{
  position:relative;
  background:#000;
  border:none;
}

/* 左右長導線 */
.frame::before,
.frame::after{
  content:"";
  position:absolute;
  top:0; bottom:0;
  width:1px;
  background:var(--line);
  pointer-events:none;
  z-index:1;
}
.frame::before{ left:var(--rail); }
.frame::after{ right:var(--rail); }

/* 角落小圓點（像圖中那種小點） */
.corner-dots{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:2;
}
.corner-dots i{
  position:absolute;
  width:6px;height:6px;
  border-radius:50%;
  border:1px solid var(--line-strong);
  opacity:.9;
}
.corner-dots i.tl{ left: calc(var(--rail) - 3px); top: 14px; }
.corner-dots i.tr{ right: calc(var(--rail) - 3px); top: 14px; }
.corner-dots i.bl{ left: calc(var(--rail) - 3px); bottom: 14px; }
.corner-dots i.br{ right: calc(var(--rail) - 3px); bottom: 14px; }

/* 內容區 */
.section{
  position:relative;
  padding: 0 var(--content-pad) 56px;
  z-index:3;
}

/* 頂部橫幅：像圖中的 Header Bar */
.topbar{
  position:sticky;
  top:0;
  z-index:50;
  background:#000;
  padding: 16px var(--content-pad);
  border-bottom:1px solid var(--line);
}
.topbar .brand{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:16px;
}
.brand-left{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.brand-tag{
  font-family:var(--serif);
  font-size:12px;
  letter-spacing:2px;
  color:var(--muted);
}
.brand-title{
  font-family:var(--serif);
  font-size:34px;
  letter-spacing:2px;
  font-weight:600;
}
.burger{
  width:42px;height:42px;
  border:1px solid var(--line);
  display:grid;place-items:center;
  border-radius:999px;
  color:var(--ink);
  background:transparent;
  cursor:pointer;
}
.burger span{
  display:block;
  width:16px;height:10px;
  position:relative;
}
.burger span::before,
.burger span::after,
.burger span i{
  content:"";
  position:absolute;
  left:0; right:0;
  height:1px;
  background:var(--ink);
  opacity:.85;
}
.burger span::before{ top:0; }
.burger span i{ top:50%; transform:translateY(-50%); }
.burger span::after{ bottom:0; }

/* 內容導線：左側垂直線 + 圓點 + 下方十字星 */
.left-rail{
  position:absolute;
  left: calc(var(--rail) + 18px);
  top: 120px;
  bottom: 90px;
  width:1px;
  background:var(--line);
  z-index:2;
  pointer-events:none;
}
.left-rail-dot{
  position:absolute;
  left: calc(var(--rail) + 14px);
  top: 300px;
  width:10px;height:10px;
  border-radius:50%;
  background:var(--ink);
  z-index:3;
  pointer-events:none;
}

/* 右側導線下方兩顆點（像圖中底部） */
.right-rail-dots{
  position:absolute;
  right: calc(var(--rail) + 14px);
  bottom: 80px;
  display:flex;
  flex-direction:column;
  gap:8px;
  pointer-events:none;
  z-index:3;
}
.right-rail-dots b{
  width:7px;height:7px;
  border-radius:50%;
  border:1px solid var(--line-strong);
  opacity:.9;
}

/* 十字星（類似圖中的四向星） */
.star-cross{
  position:absolute;
  right: calc(var(--rail) + 70px);
  top: 160px;
  width: 90px; height: 90px;
  pointer-events:none;
  z-index:3;
  opacity:.95;
}
.star-cross::before,
.star-cross::after{
  content:"";
  position:absolute;
  left:50%; top:50%;
  transform:translate(-50%,-50%);
  background:var(--ink);
}
.star-cross::before{ width:100%; height:1px; opacity:.95; }
.star-cross::after{ width:1px; height:100%; opacity:.95; }
.star-cross i{
  position:absolute;
  left:50%; top:50%;
  width:10px; height:10px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#000;
  border:1px solid rgba(255,255,255,.18);
}

/* 小星點裝飾（可選，別太花） */
.spark{
  position:absolute;
  left: calc(var(--rail) + 6px);
  bottom: 86px;
  display:flex;
  flex-direction:column;
  gap:8px;
  pointer-events:none;
  z-index:3;
  opacity:.9;
}
.spark em{
  display:block;
  width:2px; height:12px;
  background:var(--ink);
  opacity:.8;
}
.spark s{
  display:block;
  width:2px;height:2px;
  background:var(--ink);
  opacity:.9;
}
.spark small{
  display:block;
  width:8px;height:8px;
  border:1px solid var(--line-strong);
  border-radius:50%;
}

/* 內文標題與英文主視覺 */
.h1{
  margin-top: 34px;
  font-family:var(--display);
  font-style:italic;
  font-weight:400;
  letter-spacing:2px;
  font-size: 44px;
  line-height:1.1;
}
.subtitle{
  margin-top: 10px;
  font-family:var(--display);
  font-style:italic;
  font-weight:400;
  font-size: 28px;
  letter-spacing:1px;
  color:var(--ink);
  opacity:.95;
}
.lead{
  margin-top: 30px;
  color: var(--ink-weak);
  line-height: 2.1;
  font-size: 16px;
}
.lead strong{ color:var(--ink); font-weight:600; }

/* 極簡分隔線 */
.rule{
  margin: 30px 0;
  height:1px;
  width:100%;
  background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
}

/* 按鈕：極簡線框 */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  border:1px solid var(--ink);
  background:transparent;
  color:var(--ink);
  padding: 14px 28px;
  font-family:var(--serif);
  letter-spacing:2px;
  cursor:pointer;
  transition: all .2s ease;
  text-decoration:none;
  user-select:none;
}
.btn:hover{
  background:var(--ink);
  color:#000;
}
.btn-row{
  display:flex;
  gap:12px;
  align-items:center;
  margin-top: 10px;
}
.btn-row .mini{
  border-color: var(--line-strong);
  color: var(--muted);
}
.btn-row .mini:hover{
  background:transparent;
  color:var(--ink);
  border-color:var(--ink);
}

/* Quiz */
.meta{
  margin-top: 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  color:var(--muted);
  font-family:var(--display);
  font-style:italic;
  letter-spacing:2px;
}
.progress{
  display:flex;
  gap:8px;
  margin-top: 14px;
}
.seg{
  flex:1;
  height:1px;
  background:var(--line);
  position:relative;
  overflow:hidden;
}
.seg::after{
  content:"";
  position:absolute; inset:0;
  background:var(--ink);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .35s ease;
  opacity:.85;
}
.seg.done::after{ transform:scaleX(1); }
.seg.active::after{ transform:scaleX(.45); opacity:.55; }

.qno{
  margin-top: 24px;
  font-family:var(--display);
  font-style:italic;
  letter-spacing:3px;
  color:var(--muted);
}
.qtext{
  margin-top: 12px;
  font-size: 18px;
  line-height: 2;
  color: var(--ink);
  font-family: var(--serif);
  letter-spacing: .2px;
}

/* 選項：畫冊式條列 */
.options{
  margin-top: 18px;
  border-top:1px solid var(--line);
}
.opt{
  width:100%;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--line);
  color:var(--ink-weak);
  text-align:left;
  padding: 18px 0;
  cursor:pointer;
  transition: color .15s ease;
  display:flex;
  gap:14px;
  align-items:flex-start;
}
.opt:hover{ color:var(--ink); }
.opt:disabled{ cursor:default; opacity:.55; }
.bullet{
  width:10px;height:10px;
  border-radius:50%;
  border:1px solid var(--line-strong);
  margin-top: 7px;
  flex:0 0 auto;
}
.opt.selected .bullet{
  background:var(--ink);
  border-color:var(--ink);
}
.opt .txt{
  line-height:1.9;
  font-size: 16px;
}

/* Result */
.result-img-wrap{
  margin-top: 12px;
  border:1px solid var(--line);
  border-radius: 44px 44px 0 0;
  overflow:hidden;
}
.result-img{
  width:100%;
  height:auto;
  display:block;
  background:#000;
}
.result-body{
  margin-top: 28px;
}
.r-eyebrow{
  font-family:var(--display);
  font-style:italic;
  letter-spacing:2px;
  color:var(--muted);
  opacity:.9;
}
.r-name{
  margin-top: 10px;
  font-family:var(--serif);
  font-weight:600;
  font-size: 28px;
  letter-spacing:1px;
}
.r-desc{
  margin-top: 16px;
  line-height:2;
  color:var(--ink-weak);
}

/* 指標：極簡三欄 */
.seals{
  margin-top: 22px;
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:12px;
}
.seal{
  border:1px solid var(--line);
  padding: 14px 12px;
  position:relative;
  overflow:hidden;
}
.seal::before{
  content:"";
  position:absolute;
  left:0; right:0; bottom:0;
  height: var(--fill, 50%);
  background: var(--ink);
  opacity:.06;
}
.seal .lab{
  font-family:var(--display);
  font-style:italic;
  letter-spacing:2px;
  color:var(--muted);
  font-size: 12px;
  position:relative;
  z-index:1;
}
.seal .val{
  margin-top: 10px;
  font-family:var(--display);
  font-style:italic;
  color:var(--ink);
  letter-spacing:1px;
  position:relative;
  z-index:1;
  font-size: 14px;
}

/* Quote / Guide：極簡框線 */
.block{
  margin-top: 18px;
  border:1px solid var(--line);
  padding: 18px 16px;
}
.block .lab{
  font-family:var(--display);
  font-style:italic;
  letter-spacing:2px;
  color:var(--muted);
  font-size: 12px;
}
.block .txt{
  margin-top: 10px;
  line-height:2;
  color:var(--ink);
  opacity:.92;
}
.block .txt.muted{
  color:var(--ink-weak);
}

/* CTA */
.cta{
  margin-top: 14px;
}
.cta a{
  display:block;
  border:1px solid var(--ink);
  color:var(--ink);
  padding: 14px 16px;
  text-decoration:none;
  letter-spacing:1px;
  transition: all .2s ease;
}
.cta a:hover{
  background:var(--ink);
  color:#000;
}

/* Footer stats */
.stats{
  margin-top: 20px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
  color:var(--muted);
  line-height:1.9;
}
.stats strong{ color:var(--ink); }

/* 動畫：微量 */
@keyframes fadeUp{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
.in{ animation: fadeUp .35s ease both; }

/* 小螢幕 */
@media (max-width: 520px){
  :root{
    --content-pad: 22px;
    --rail: 14px;
  }
  .topbar{ padding: 14px var(--content-pad); }
  .brand-title{ font-size: 28px; }
  .h1{ font-size: 38px; }
  .subtitle{ font-size: 24px; }
  .seals{ grid-template-columns: 1fr; }
  .left-rail{ left: calc(var(--rail) + 12px); }
  .left-rail-dot{ left: calc(var(--rail) + 8px); }
  .star-cross{ right: calc(var(--rail) + 34px); width:72px;height:72px; top:140px; }
}
</style>
</head>

<div id="app">
  <div class="frame" id="frame">

      <div class="qtext" id="qtext"></div>

      <div class="options" id="options"></div>

      <div class="btn-row" style="margin-top:18px;">
        <button class="btn mini" type="button" onclick="location.reload()">重新開始</button>
      </div>
    </section>

    <!-- RESULT -->
    <section id="result" class="section" style="display:none;">
      <div class="result-img-wrap in">
        <img id="result-img" class="result-img" src="" alt="結果圖" />
      </div>

      <div class="result-body in">
        <div class="r-eyebrow">Soul Specimen Revealed</div>
        <div class="r-name" id="r-name">【—】</div>
        <div class="r-desc" id="r-desc"></div>

        <div class="seals" id="seals"></div>

        <div class="block">
          <div class="lab">專屬台詞</div>
          <div class="txt" id="r-quote"></div>
        </div>

        <div class="block">
          <div class="lab">Prophecy</div>
          <div class="txt muted" id="r-guide"></div>
          <div class="cta" id="r-cta"></div>
        </div>

        <div class="stats" id="stats">
          ✦ 正在讀取深淵數據⋯
        </div>

        <div class="btn-row" style="margin-top:18px;">
          <button class="btn" type="button" onclick="location.reload()">Re-Enter</button>
          <button class="btn mini" type="button" onclick="copyResult()">複製結果文字</button>
        </div>
      </div>
    </section>

  </div>
</div>

const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];

/* ========= STATE ========= */
let qi = 0;
let axesScore = {};
AXES.forEach(k => axesScore[k] = 0);

/* ========= UI ========= */
const elIntro  = document.getElementById('intro');
const elQuiz   = document.getElementById('quiz');
const elResult = document.getElementById('result');

const elProgress = document.getElementById('progress');
const elLabel    = document.getElementById('quiz-label');
const elQno      = document.getElementById('qno');
const elQtext    = document.getElementById('qtext');
const elOptions  = document.getElementById('options');

function startQuiz(){
  elIntro.style.display = 'none';
  elResult.style.display = 'none';
  elQuiz.style.display = 'block';
  elQuiz.classList.add('in');

  qi = 0;
  AXES.forEach(k => axesScore[k] = 0);

  // build progress
  elProgress.innerHTML = '';
  for(let i=0;i<questions.length;i++){
    const d = document.createElement('div');
    d.className = 'seg';
    elProgress.appendChild(d);
  }

  showQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
}

function updateProgress(){
  const segs = document.querySelectorAll('.seg');
  segs.forEach((s, idx) => {
    s.classList.remove('done','active');
    if(idx < qi) s.classList.add('done');
    else if(idx === qi) s.classList.add('active');
  });

  elLabel.textContent = `Question ${ROMAN[qi]} of ${ROMAN[questions.length-1]}`;
  elQno.textContent = `— ${ROMAN[qi]} —`;
}

function showQuestion(){
  updateProgress();
  const q = questions[qi];

  elQtext.textContent = q.text;

  elOptions.innerHTML = '';
  q.options.forEach((opt) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.type = 'button';
    btn.innerHTML = `<span class="bullet"></span><span class="txt">${opt.text}</span>`;
    btn.onclick = () => pick(opt.add, btn);
    elOptions.appendChild(btn);
  });
}

function addAxisScores(obj){
  for(const k in obj){
    if(Object.prototype.hasOwnProperty.call(axesScore, k)){
      axesScore[k] += obj[k];
    }
  }
}

function pick(addObj, btn){
  // lock
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  btn.classList.add('selected');
  addAxisScores(addObj);

  setTimeout(()=>{
    qi++;
    if(qi < questions.length) showQuestion();
    else showResult();
  }, 260);
}

/* ========= RESULT LOGIC ========= */
function determineResultKey(){
  const {dom,sub,control,manip,chaos,devotion} = axesScore;
  const diff = dom-sub;
  const stance = diff>=2 ? "dom" : diff<=-2 ? "sub" : "switch";
  const secondary = [
    {k:"control",v:control},{k:"manip",v:manip},{k:"chaos",v:chaos},{k:"devotion",v:devotion}
  ].sort((a,b)=>b.v-a.v)[0].k;

  const veryChaos = chaos>=7, veryControl=control>=7, veryManip=manip>=7, veryDevotion=devotion>=7;

  if(veryChaos && sub>=dom)  return "病態攻 × 斯德哥爾摩受";
  if(veryChaos && dom>sub)   return "無情獸群攻 × 自毀抹布受";
  if(veryManip || (secondary==="manip" && manip>=5)) return "腹黑勢利攻 × 卑劣淫蕩受";
  if(veryControl || (secondary==="control" && control>=5)){
    if(stance==="sub" || devotion>=6) return "佔有囚禁攻 × 自願沉淪受";
    if(chaos>=5) return "黑化掠奪攻 × 清冷自持受";
    return "陰鬱偏執攻 × 陽光直男受";
  }
  if(veryDevotion || (secondary==="devotion" && devotion>=5)){
    if(stance==="dom") return "二哈黑龍攻 × 人妻王子受";
    return "佔有囚禁攻 × 自願沉淪受";
  }
  if(stance==="dom") return chaos>=5 ? "暴力黑獅攻 × 冰山白神攻" : "陰鬱偏執攻 × 陽光直男受";
  if(stance==="sub") return control>=4 ? "偏執瘋子攻 × 廢物美人受" : "放蕩影子攻 × 禁慾學者受";
  return chaos>=5 ? "暴力黑獅攻 × 冰山白神攻" : "放蕩影子攻 × 禁慾學者受";
}

function showResult(){
  elQuiz.style.display = 'none';
  elIntro.style.display = 'none';
  elResult.style.display = 'block';
  elResult.classList.add('in');

  const key = determineResultKey();
  const r = resultsData[key];

  document.getElementById('result-img').src = r.image;
  document.getElementById('r-name').textContent = `【${r.soulName}】`;
  document.getElementById('r-desc').textContent = r.soulDesc;
  document.getElementById('r-quote').textContent = r.quote;
  document.getElementById('r-guide').textContent = r.guide;

  // seals
  const seals = document.getElementById('seals');
  seals.innerHTML = `
    <div class="seal" style="--fill:${r.dangerFill}">
      <div class="lab">危險指數</div>
      <div class="val">${r.danger}</div>
    </div>
    <div class="seal" style="--fill:${r.attrFill}">
      <div class="lab">${r.attr}</div>
      <div class="val">${r.attrVal}</div>
    </div>
    <div class="seal" style="--fill:30%">
      <div class="lab">逃脫機率</div>
      <div class="val">${r.escape}</div>
    </div>
  `;

  // CTA
  const cta = document.getElementById('r-cta');
  cta.innerHTML = `
    <a href="${r.link}" target="_blank" rel="noopener">
      ▷ 解鎖你的故事樣本：${r.bookName}
    </a>
  `;

  // stats
  sendStats(key);

  window.scrollTo({top:0, behavior:'smooth'});
}

function sendStats(key){
  const stats = document.getElementById('stats');
  if(GAS_URL==="在此貼上你的_GAS_網址"){
    stats.textContent = "✦ 尚未串接資料庫，僅顯示本地結果。";
    return;
  }
  fetch(`${GAS_URL}?result=${encodeURIComponent(key)}`)
    .then(r=>r.json())
    .then(data=>{
      if(data.status==="success"){
        const uc = data.stats[key] || 1;
        const pct = ((uc/data.total)*100).toFixed(1);
        stats.innerHTML = `✦ 目前共有 <strong>${data.total}</strong> 個靈魂墜入深淵。與你同類的人約佔 <strong>${pct}%</strong>。`;
      } else {
        stats.textContent = "✦ 數據讀取失敗，但深淵已記住你的選擇。";
      }
    })
    .catch(()=>{
      stats.textContent = "✦ 數據讀取失敗，但深淵已記住你的選擇。";
    });
}

function copyResult(){
  const name = document.getElementById('r-name').textContent || '';
  const desc = document.getElementById('r-desc').textContent || '';
  const quote = document.getElementById('r-quote').textContent || '';
  const text = `${name}\n${desc}\n\n「${quote}」`;
  navigator.clipboard.writeText(text).then(()=>{
    alert('已複製結果文字');
  }).catch(()=>{
    alert('複製失敗，請手動複製');
  });
}
