<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事另有結局｜黑暗特質心理測驗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Cinzel:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --abyss:      #020810;
            --deep:       #050e1c;
            --surface:    rgba(6, 16, 36, 0.82);
            --blue:       #4facfe;
            --cyan:       #00f2fe;
            --teal:       #00d4aa;
            --text:       #d8eaff;
            --muted:      #7a9fc2;
            --dim:        #4a6a8a;
            --danger:     #ff4f72;
            --gold:       #f5c842;
            --acid:       #a3ff47;
            --purple:     #b04fff;
            --mono:       'Share Tech Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--abyss);
            color: var(--text);
            font-family: 'Noto Serif TC', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        /* ══ BG ══ */
        .bg-gradient {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 55% at 15% 85%, rgba(0,50,110,0.4) 0%, transparent 60%),
                radial-gradient(ellipse 55% 45% at 85% 15%, rgba(79,172,254,0.1) 0%, transparent 55%),
                radial-gradient(ellipse 40% 35% at 50% 50%, rgba(0,212,170,0.04) 0%, transparent 70%),
                linear-gradient(170deg, #021228 0%, #020810 60%);
        }
        #particle-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .scanlines {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
        }
        /* Vignette */
        .vignette {
            position: fixed; inset: 0; z-index: 3; pointer-events: none;
            background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 50%, rgba(0,0,0,0.55) 100%);
        }

        /* ══ CARD ══ */
        #app {
            position: relative; z-index: 10;
            max-width: 660px; width: 94%;
            margin: 36px auto 60px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(79,172,254,0.18);
            border-top: 1px solid rgba(79,172,254,0.35);
            border-radius: 2px;
            box-shadow:
                0 0 0 1px rgba(79,172,254,0.04),
                0 0 80px rgba(0,70,180,0.18),
                0 50px 100px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(79,172,254,0.12);
            overflow: hidden;
        }

        /* Corner brackets */
        .corner { position: absolute; width: 20px; height: 20px; border-color: rgba(79,172,254,0.5); border-style: solid; z-index: 5; }
        .corner-tl { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
        .corner-tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
        .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 1px 1px; }
        .corner-br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

        .card-inner { padding: 38px 44px 52px; text-align: center; }

        /* ══ TOP BAR ══ */
        .top-bar {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 28px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(79,172,254,0.1);
        }
        .top-bar-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--blue);
            box-shadow: 0 0 10px var(--blue), 0 0 20px rgba(79,172,254,0.4);
            animation: blink 2.4s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
        .top-bar-label {
            font-family: var(--mono);
            font-size: 0.88rem; letter-spacing: 3px;
            color: var(--muted);
        }
        .top-bar-line { flex:1; height:1px; background: linear-gradient(90deg, rgba(79,172,254,0.18), transparent); }

        /* ══ COVER IMAGE — landscape 16:9, full bleed ══ */
        .cover-wrap {
            position: relative;
            /* Pull out of card-inner padding to bleed edge-to-edge */
            margin: -38px -44px 36px -44px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }
        .cover-img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: 50% 50%;
            display: block;
            filter: brightness(0.88) saturate(1.2) contrast(1.05);
            transition: transform 0.7s ease;
        }
        .cover-wrap:hover .cover-img { transform: scale(1.03); }

        /* Bottom gradient fade */
        .cover-wrap::after {
            content: '';
            position: absolute; inset: 0;
            background:
                linear-gradient(to bottom, rgba(2,8,16,0.05) 0%, transparent 25%, transparent 50%, rgba(2,8,16,0.9) 100%),
                linear-gradient(to right, rgba(2,8,16,0.25) 0%, transparent 15%, transparent 85%, rgba(2,8,16,0.25) 100%);
            pointer-events: none;
        }
        .cover-tag {
            position: absolute; bottom: 22px; left: 0; z-index: 2;
            background: rgba(6,16,36,0.78);
            border: 1px solid rgba(79,172,254,0.45);
            border-left: none;
            color: var(--blue);
            font-family: var(--mono);
            font-size: 0.8rem; letter-spacing: 4px;
            padding: 8px 20px 8px 22px;
            backdrop-filter: blur(10px);
        }
        .cover-tag::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px; background: var(--blue);
            box-shadow: 0 0 10px var(--blue);
        }

        /* Result image — same portrait ratio */
        .result-cover-wrap {
            position: relative;
            margin-bottom: 28px;
            border-radius: 2px;
            overflow: hidden;
            aspect-ratio: 3 / 4;
            max-height: 440px;
        }
        .result-img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
            filter: brightness(0.88) saturate(1.2) contrast(1.05);
        }
        .result-cover-wrap::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(2,8,16,0.92) 100%);
            pointer-events: none;
        }

        /* ══ TITLES ══ */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.6rem; font-weight: 700;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 0 0 25px rgba(79,172,254,0.7), 0 0 60px rgba(79,172,254,0.2);
            margin-bottom: 22px;
            line-height: 1.2;
        }

        /* ══ BODY TEXT ══ */
        p.intro {
            color: #a8c8e8;
            font-size: 1.1rem; line-height: 2.1;
            margin-bottom: 14px;
            font-weight: 300;
        }
        p.intro strong { color: var(--text); font-weight: 600; }

        .divider {
            display: flex; align-items: center; gap: 10px;
            margin: 24px 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(79,172,254,0.25), transparent);
        }
        .divider-icon { color: rgba(79,172,254,0.4); font-size: 0.75rem; letter-spacing: 4px; font-family: var(--mono); }

        /* ══ START BUTTON ══ */
        .start-btn {
            display: inline-block; position: relative;
            padding: 15px 50px;
            background: transparent;
            color: var(--blue);
            border: 1px solid rgba(79,172,254,0.45);
            font-family: 'Cinzel', serif;
            font-size: 1.05rem; letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.4s ease;
            overflow: hidden;
            margin-top: 10px;
        }
        .start-btn span { position: relative; z-index: 1; }
        .start-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(79,172,254,0.18), rgba(0,114,255,0.12));
            opacity: 0; transition: opacity 0.4s;
        }
        .start-btn::after {
            content: '';
            position: absolute; bottom: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--blue), transparent);
        }
        .start-btn:hover { color: #fff; border-color: var(--blue); box-shadow: 0 0 35px rgba(79,172,254,0.35), inset 0 0 20px rgba(79,172,254,0.05); }
        .start-btn:hover::before { opacity: 1; }

        .restart-btn {
            display: inline-block;
            padding: 10px 32px; margin-top: 30px;
            background: transparent; color: var(--dim);
            border: 1px solid rgba(74,106,138,0.3);
            font-family: var(--mono);
            font-size: 0.9rem; letter-spacing: 3px;
            cursor: pointer; transition: all 0.3s;
        }
        .restart-btn:hover { color: var(--muted); border-color: var(--muted); }

        /* ══ QUIZ ══ */
        .progress-bar-wrap { display: flex; gap: 5px; margin-bottom: 30px; }
        .progress-seg {
            flex: 1; height: 3px;
            background: rgba(79,172,254,0.1);
            position: relative; overflow: hidden;
        }
        .progress-seg::after {
            content: ''; position: absolute; inset: 0;
            background: var(--blue);
            box-shadow: 0 0 8px rgba(79,172,254,0.8);
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.5s ease;
        }
        .progress-seg.active::after { transform: scaleX(0.5); background: rgba(79,172,254,0.5); }
        .progress-seg.done::after { transform: scaleX(1); }

        .question-num {
            font-family: var(--mono);
            font-size: 1rem; letter-spacing: 4px;
            color: var(--blue); margin-bottom: 12px;
            text-align: center;
        }
        #question-text {
            font-size: 1.18rem; line-height: 1.9;
            color: var(--text); font-weight: 400;
            margin-bottom: 26px;
            padding: 16px 18px;
            border-left: 2px solid rgba(79,172,254,0.5);
            background: rgba(79,172,254,0.03);
        }

        .option-btn {
            display: flex; align-items: flex-start; gap: 14px;
            width: 100%; padding: 17px 20px;
            margin: 9px 0;
            background: rgba(3,10,24,0.7);
            color: #a8c4e0;
            border: 1px solid rgba(79,172,254,0.1);
            border-radius: 1px;
            cursor: pointer; transition: all 0.28s ease;
            text-align: left;
            font-family: 'Noto Serif TC', serif;
            font-size: 1.05rem; line-height: 1.7;
            position: relative; overflow: hidden;
        }
        .option-idx {
            font-family: var(--mono); font-size: 0.95rem;
            color: var(--dim); flex-shrink: 0; padding-top: 2px;
            transition: color 0.28s;
        }
        .option-btn:hover { background: rgba(79,172,254,0.07); color: #daeeff; border-color: rgba(79,172,254,0.3); }
        .option-btn:hover .option-idx { color: var(--blue); }
        .option-btn.selected { background: rgba(79,172,254,0.12); color: #fff; border-color: rgba(79,172,254,0.5); }
        .option-btn.selected .option-idx { color: var(--cyan); }

        /* ══ RESULT — CHEMISTRY LAB ══ */

        /* Lab header */
        .lab-header {
            font-family: var(--mono);
            font-size: 0.9rem; letter-spacing: 4px;
            color: var(--teal);
            margin-bottom: 8px;
            display: flex; align-items: center; gap: 8px;
        }
        .lab-header::before {
            content: '⬡'; font-size: 1.05rem; color: var(--teal);
        }

        .result-soul-name {
            font-family: 'Cinzel', serif;
            font-size: 2rem; font-weight: 700;
            color: var(--cyan);
            text-shadow: 0 0 25px rgba(0,242,254,0.5), 0 0 50px rgba(0,242,254,0.15);
            letter-spacing: 3px; line-height: 1.2;
            margin-bottom: 12px;
        }
        .result-soul-desc {
            color: #a0c4e0; font-size: 1.08rem;
            font-style: italic; line-height: 1.75;
            padding: 12px 16px;
            border-left: 2px solid rgba(0,212,170,0.4);
            background: rgba(0,212,170,0.04);
            margin-bottom: 28px;
        }

        /* Compound formula bar */
        .formula-bar {
            display: flex; align-items: center; gap: 0;
            margin-bottom: 28px;
            border: 1px solid rgba(79,172,254,0.15);
            background: rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .formula-label {
            background: rgba(79,172,254,0.1);
            border-right: 1px solid rgba(79,172,254,0.15);
            padding: 12px 16px;
            font-family: var(--mono); font-size: 0.85rem;
            letter-spacing: 2px; color: var(--muted);
            flex-shrink: 0;
        }
        .formula-value {
            padding: 12px 18px;
            font-family: var(--mono); font-size: 0.95rem;
            color: var(--blue); letter-spacing: 2px;
            flex: 1;
        }
        .formula-key {
            padding: 0 12px; font-size: 1.3rem;
            color: rgba(79,172,254,0.2);
        }

        /* Specimen vials — the 3 stat cards */
        .vials-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 28px;
        }
        .vial {
            position: relative;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(79,172,254,0.12);
            padding: 16px 14px 14px;
            overflow: hidden;
            text-align: center;
        }
        /* Liquid fill animation */
        .vial::before {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: var(--fill, 60%);
            opacity: 0.1;
            transition: height 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .vial.danger   { border-color: rgba(255,79,114,0.2); }
        .vial.danger::before  { background: var(--danger); }
        .vial.attr     { border-color: rgba(79,172,254,0.2); }
        .vial.attr::before    { background: var(--blue); }
        .vial.escape   { border-color: rgba(245,200,66,0.2); }
        .vial.escape::before  { background: var(--gold); }

        /* Bubble effect */
        .vial::after {
            content: '';
            position: absolute; bottom: 6px; left: 50%;
            transform: translateX(-50%);
            width: 4px; height: 4px; border-radius: 50%;
            animation: bubble 3s ease-in-out infinite;
        }
        .vial.danger::after  { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
        .vial.attr::after    { background: var(--blue);   box-shadow: 0 0 6px var(--blue);   }
        .vial.escape::after  { background: var(--gold);   box-shadow: 0 0 6px var(--gold);   }
        @keyframes bubble { 0%,100%{bottom:6px;opacity:0.6;} 50%{bottom:12px;opacity:0.9;} }

        .vial-label {
            font-family: var(--mono); font-size: 0.78rem;
            letter-spacing: 2px; color: var(--dim);
            margin-bottom: 8px; text-transform: uppercase;
            position: relative; z-index: 1;
        }
        .vial-value {
            font-family: var(--mono); font-size: 1.05rem;
            letter-spacing: 1px;
            position: relative; z-index: 1;
        }
        .vial.danger .vial-value  { color: var(--danger); text-shadow: 0 0 10px rgba(255,79,114,0.5); }
        .vial.attr   .vial-value  { color: var(--blue);   text-shadow: 0 0 10px rgba(79,172,254,0.5); }
        .vial.escape .vial-value  { color: var(--gold);   text-shadow: 0 0 10px rgba(245,200,66,0.5); }

        /* Analysis readout */
        .analysis-block {
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(0,212,170,0.15);
            border-left: 3px solid var(--teal);
            padding: 18px 20px;
            margin-bottom: 24px;
            position: relative;
        }
        .analysis-block::before {
            content: 'SPECIMEN ANALYSIS';
            position: absolute; top: -9px; left: 14px;
            background: var(--deep);
            padding: 0 8px;
            font-family: var(--mono); font-size: 0.78rem;
            letter-spacing: 3px; color: var(--teal);
        }
        .analysis-label {
            font-family: var(--mono); font-size: 0.85rem;
            letter-spacing: 3px; color: var(--teal);
            margin-bottom: 12px; opacity: 0.9;
        }
        .analysis-text {
            color: #daeeff; font-size: 1.1rem;
            line-height: 1.9; font-style: italic;
        }
        /* Typewriter cursor blink */
        .analysis-text::after {
            content: '█';
            font-size: 0.7rem; color: var(--teal);
            animation: cursor-blink 1.2s step-end infinite;
            margin-left: 2px;
        }
        @keyframes cursor-blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

        /* Compound reaction notes */
        .reaction-block {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(79,172,254,0.1);
            border-top: 2px solid rgba(79,172,254,0.2);
            padding: 20px 22px;
            margin-bottom: 24px;
            position: relative;
        }
        .reaction-block::before {
            content: 'REACTION NOTES';
            position: absolute; top: -9px; left: 14px;
            background: var(--deep);
            padding: 0 8px;
            font-family: var(--mono); font-size: 0.78rem;
            letter-spacing: 3px; color: var(--muted);
        }
        .reaction-guide {
            color: #b0cfec; font-size: 1.05rem;
            line-height: 1.9; margin-bottom: 20px;
        }

        /* CTA button — styled like a sealed specimen container */
        .specimen-btn {
            display: block; width: 100%;
            padding: 18px 24px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(79,172,254,0.3);
            border-bottom: 2px solid rgba(79,172,254,0.5);
            color: var(--blue);
            text-decoration: none;
            font-family: var(--mono);
            font-size: 1rem; letter-spacing: 3px;
            text-align: center;
            transition: all 0.35s ease;
            position: relative; overflow: hidden;
        }
        .specimen-btn::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0;
            width: var(--hover-w, 0%);
            background: rgba(79,172,254,0.08);
            transition: width 0.35s ease;
        }
        .specimen-btn:hover { color: #fff; border-color: var(--blue); --hover-w: 100%; box-shadow: 0 0 30px rgba(79,172,254,0.2); }
        .specimen-btn-label {
            font-size: 0.85rem; letter-spacing: 2px;
            color: var(--dim); margin-bottom: 6px;
            font-family: var(--mono);
        }

        /* Stats footer */
        .stats-footer {
            margin-top: 26px; padding: 16px 0 0;
            border-top: 1px solid rgba(79,172,254,0.08);
            font-family: var(--mono); font-size: 0.98rem;
            color: var(--muted); line-height: 1.7;
        }
        .stats-footer strong { color: var(--text); }

        /* ══ UTILS ══ */
        .hidden { display: none; }

        /* Left-align overrides for content blocks */
        #question-text,
        .option-btn,
        .result-soul-desc,
        .formula-bar,
        .analysis-block,
        .reaction-block,
        .reaction-guide,
        .analysis-text,
        .stats-footer { text-align: left; }

        /* Center-align for labels and headers */
        .lab-header,
        .result-eyebrow { justify-content: center; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }

        /* Mobile */
        @media (max-width: 500px) {
            .card-inner { padding: 28px 22px 40px; }
            .cover-wrap { margin: -28px -22px 28px -22px; aspect-ratio: 4/3; }
            h1 { font-size: 1.7rem; letter-spacing: 5px; }
            .vials-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="bg-gradient"></div>
<canvas id="particle-canvas"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<div id="app">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="card-inner">

        <!-- ══ INTRO ══ -->
        <div id="intro-screen">
            <div class="top-bar">
                <div class="top-bar-dot"></div>
                <span class="top-bar-label">ABYSS ECHO · PSYCHOLOGICAL TEST</span>
                <div class="top-bar-line"></div>
            </div>

            <div class="cover-wrap">
                <img class="cover-img"
                     src="https://framerusercontent.com/images/Kmj3VVRqy65C2TU6XyrVhgahlM.png"
                     alt="深淵迴響封面圖">
                <div class="cover-tag">DARK TRAIT ANALYSIS</div>
            </div>

            <h1>深淵迴響</h1>

            <p class="intro">每個人心裡都有一個<strong>不能說出口的偏好</strong>。<br>有人嚮往溫柔，有人沉迷失控。<br>有人渴望被征服，有人其實想反過來掌控。</p>

            <div class="divider"><span class="divider-icon">· · ·</span></div>

            <p class="intro">這是一場關於<strong>「權力、依賴、慾望與選擇」</strong>的深層測試。<br>請用直覺回答。別想太多。</p>

            <button class="start-btn" onclick="startQuiz()"><span>墜入深淵</span></button>
        </div>

        <!-- ══ QUIZ ══ -->
        <div id="quiz-screen" class="hidden">
            <div class="top-bar">
                <div class="top-bar-dot"></div>
                <span class="top-bar-label" id="quiz-label">QUESTION 1 / 5</span>
                <div class="top-bar-line"></div>
            </div>

            <div class="progress-bar-wrap" id="progress-bar">
                <div class="progress-seg"></div>
                <div class="progress-seg"></div>
                <div class="progress-seg"></div>
                <div class="progress-seg"></div>
                <div class="progress-seg"></div>
            </div>

class P {
  constructor() { this.reset(true); }
  reset(rand) {
    this.x = Math.random() * canvas.width;
    this.y = rand ? Math.random() * canvas.height : canvas.height + 4;
    this.r = Math.random() * 1.3 + 0.2;
    this.vy = Math.random() * 0.5 + 0.15;
    this.vx = (Math.random() - 0.5) * 0.15;
    this.a = Math.random() * 0.5 + 0.05;
    this.t = Math.random() * Math.PI * 2;
    this.col = Math.random() > 0.85 ? '#00d4aa' : (Math.random() > 0.7 ? '#00f2fe' : '#4facfe');
  }
  update() {
    this.y -= this.vy; this.x += this.vx;
    this.t += 0.018;
    if (this.y < -4 || this.x < -4 || this.x > canvas.width + 4) this.reset(false);
  }
  draw() {
    ctx.globalAlpha = this.a * (0.75 + 0.25 * Math.sin(this.t));
    ctx.fillStyle = this.col;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
  }
}
function init() {
  pts = [];
  const n = (canvas.width * canvas.height) / 6500;
  for (let i = 0; i < n; i++) pts.push(new P());
}
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = 1;
  pts.forEach(p => { p.update(); p.draw(); });
  ctx.globalAlpha = 1;
  requestAnimationFrame(loop);
}

  qi = 0;
  AXES.forEach(k => axesScore[k] = 0);

  showQuestion();

function updateProgress() {
  const segs = document.querySelectorAll('.progress-seg');
  segs.forEach((s, i) => {
    s.classList.remove('active','done');
    if (i < qi) s.classList.add('done');
    else if (i === qi) s.classList.add('active');
  });
  document.getElementById('quiz-label').textContent = `QUESTION ${qi + 1} / ${questions.length}`;
  document.getElementById('question-num').textContent = `Q · ${String(qi + 1).padStart(2, '0')}`;
}

    btn.innerHTML = `<span class="option-idx">[${LABELS[i]}]</span><span>${opt.text}</span>`;
    btn.onclick = () => pick(opt.add, btn);
    c.appendChild(btn);

    setTimeout(() => {
      btn.style.transition = 'opacity 0.38s ease, transform 0.38s ease, background 0.28s, color 0.28s, border-color 0.28s';
      btn.style.opacity = '1';
      btn.style.transform = 'translateY(0)';
    }, 60 + i * 80);
  });
}

function addAxisScores(addObj) {
  for (const k in addObj) {
    if (!Object.prototype.hasOwnProperty.call(axesScore, k)) continue;
    axesScore[k] += addObj[k];
  }
}

function pick(addObj, btn) {
  document.querySelectorAll('.option-btn').forEach(b => {
    b.style.pointerEvents='none';
    b.style.opacity='0.5';
  });
  btn.classList.add('selected');
  btn.style.opacity = '1';

  addAxisScores(addObj);

  setTimeout(() => {
    qi++;
    if (qi < questions.length) showQuestion();
    else showResult();
  }, 350);
}

/* ══ RESULT LOGIC ══ */
function topAxes(n=2) {
  return Object.entries(axesScore)
    .sort((a,b) => b[1]-a[1])
    .slice(0,n)
    .map(([k,v]) => ({ k, v }));
}

function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

function determineResultKey() {
  const dom = axesScore.dom;
  const sub = axesScore.sub;
  const control = axesScore.control;
  const manip = axesScore.manip;
  const chaos = axesScore.chaos;
  const devotion = axesScore.devotion;

  const diff = dom - sub;

  // 主傾向（攻/受/雙向）
  const stance = diff >= 2 ? "dom" : diff <= -2 ? "sub" : "switch";

  // 次傾向：取 control/manip/chaos/devotion 最高者
  const secondary = [
    { k:"control", v: control },
    { k:"manip", v: manip },
    { k:"chaos", v: chaos },
    { k:"devotion", v: devotion },
  ].sort((a,b)=>b.v-a.v)[0].k;

  // 強烈特徵判斷（讓某些結果更容易命中）
  const veryChaos = chaos >= 7;
  const veryControl = control >= 7;
  const veryManip = manip >= 7;
  const veryDevotion = devotion >= 7;

  // 1) 極端病態/自毀優先（不管攻受都能落到這裡）
  if (veryChaos && sub >= dom) return "病態攻 × 斯德哥爾摩受";
  if (veryChaos && dom > sub) return "無情獸群攻 × 自毀抹布受";

  // 2) 算計利益流
  if (veryManip || (secondary === "manip" && manip >= 5)) return "腹黑勢利攻 × 卑劣淫蕩受";

  // 3) 囚禁控制流
  if (veryControl || (secondary === "control" && control >= 5)) {
    if (stance === "sub" || devotion >= 6) return "佔有囚禁攻 × 自願沉淪受";
    // 偏攻且控制高：更掠奪/黑化
    if (chaos >= 5) return "黑化掠奪攻 × 清冷自持受";
    return "陰鬱偏執攻 × 陽光直男受";
  }

  // 4) 依附忠犬流（相對甜但仍黑暗）
  if (veryDevotion || (secondary === "devotion" && devotion >= 5)) {
    // 依附高、攻向：忠犬魔王
    if (stance === "dom") return "二哈黑龍攻 × 人妻王子受";
    // 依附高、受向：更像自願沉淪
    return "佔有囚禁攻 × 自願沉淪受";
  }

  // 5) 最後用 stance + 風味補齊（避免剩下都落同一組）
  if (stance === "dom") {
    if (chaos >= 5) return "暴力黑獅攻 × 冰山白神攻";
    return "陰鬱偏執攻 × 陽光直男受";
  }
  if (stance === "sub") {
    if (control >= 4) return "偏執瘋子攻 × 廢物美人受";
    return "放蕩影子攻 × 禁慾學者受";
  }
  // switch
  if (chaos >= 5) return "暴力黑獅攻 × 冰山白神攻";
  return "放蕩影子攻 × 禁慾學者受";
}

function showResult() {
  document.getElementById('quiz-screen').classList.add('hidden');
  const rs = document.getElementById('result-screen');
  rs.classList.remove('hidden');
  rs.classList.add('animate-in');

  const key = determineResultKey();
  const r = resultsData[key];

  document.getElementById('final-result-img').src = r.image;

  const parts = key.split(' × ');

  document.getElementById('result-content').innerHTML = `
    <div class="lab-header">SOUL SPECIMEN IDENTIFIED</div>
    <div class="result-soul-name">【${r.soulName}】</div>
    <div class="result-soul-desc">${r.soulDesc}</div>

    <div class="formula-bar">
      <div class="formula-label">COMPOUND</div>
      <div class="formula-value">${parts[0]} <span style="color:rgba(79,172,254,0.3);padding:0 6px;">⊗</span> ${parts[1]||''}</div>
    </div>

    <div class="vials-row">
      <div class="vial danger" style="--fill:${r.dangerFill}">
        <div class="vial-label">危險指數</div>
        <div class="vial-value">${r.danger}</div>
      </div>
      <div class="vial attr" style="--fill:${r.attrFill}">
        <div class="vial-label">${r.attr}</div>
        <div class="vial-value">${r.attrVal}</div>
      </div>
      <div class="vial escape">
        <div class="vial-label">逃脫機率</div>
        <div class="vial-value">${r.escape}</div>
      </div>
    </div>

    <div class="analysis-block">
      <div class="analysis-label">SUBJECT QUOTE · 專屬台詞</div>
      <div class="analysis-text">「${r.quote}」</div>
    </div>

    <div class="reaction-block">
      <div class="reaction-guide">${r.guide}</div>
      <div class="specimen-btn-label">FATE COMPOUND · 宿命調配</div>
      <a href="${r.link}" target="_blank" class="specimen-btn">
        ▷ 解鎖你的故事樣本：《${r.bookName}》
      </a>
    </div>
  `;

  // vials fill animation after paint
  setTimeout(() => {
    document.querySelectorAll('.vial').forEach(v => {
      v.style.setProperty('--fill', v.style.getPropertyValue('--fill') || '60%');
    });
  }, 100);

  sendStats(key);
}

function sendStats(key) {
  if (GAS_URL === "在此貼上你的_GAS_網址") {
    document.getElementById('stats-content').innerHTML =
      '<span style="color:var(--teal);margin-right:6px;">◈</span> 尚未串接資料庫，僅顯示本地結果。';
    return;
  }
  fetch(`${GAS_URL}?result=${encodeURIComponent(key)}`)
    .then(r => r.json())
    .then(data => {
      if (data.status === "success") {
        const uc = data.stats[key] || 1;
        const pct = ((uc / data.total) * 100).toFixed(1);
        document.getElementById('stats-content').innerHTML = `
          <span style="color:var(--teal);margin-right:6px;">◈</span>
          目前共有 <strong>${data.total}</strong> 個靈魂墜入深淵。
          與你同類的人約佔 <strong style="color:var(--cyan)">${pct}%</strong>。
        `;
      }
    })
    .catch(() => {
      document.getElementById('stats-content').innerHTML =
        '<span style="color:var(--dim);">數據讀取失敗，但深淵已記住你的選擇。</span>';
    });
}
</script>
