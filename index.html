<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>故事另有結局｜黑暗特質心理測驗</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet" />

<style>
:root{
  --bg-center: #1a1a1a;
  --bg: #050505;
  --ink: #ffffff;
  --ink-weak: rgba(255,255,255,.75);
  --line: rgba(255,255,255,.15);
  --line-strong: rgba(255,255,255,.35);
  --muted: rgba(255,255,255,.55);
  --accent: #f4f4f4;
  --serif: 'Noto Serif TC', serif;
  --display: 'IM Fell English', serif;

  --rail: 24px;       /* 左右導線距離邊緣 */
  --content-pad: 48px;
  --maxw: 860px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background: radial-gradient(circle at 50% 10%, var(--bg-center) 0%, var(--bg) 80%);
  background-attachment: fixed;
  color: var(--ink);
  font-family: var(--serif);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  -webkit-font-smoothing: antialiased;
}

/* 主舞台 */
#app{
  width: 100%;
  max-width: var(--maxw);
  padding: 32px 16px 100px;
  position: relative;
}

/* 外框：極簡畫冊導線 */
.frame{
  position: relative;
  background: transparent;
  border: none;
}

/* 左右長導線 */
.frame::before,
.frame::after{
  content: "";
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--line) 10%, var(--line) 90%, transparent);
  pointer-events: none;
  z-index: 1;
}
.frame::before{ left: var(--rail); }
.frame::after{ right: var(--rail); }

/* 角落小圓點 */
.corner-dots{
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}
.corner-dots i{
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--line-strong);
  box-shadow: 0 0 8px rgba(255,255,255,0.2);
}
.corner-dots i.tl{ left: calc(var(--rail) - 3px); top: 14px; }
.corner-dots i.tr{ right: calc(var(--rail) - 3px); top: 14px; }
.corner-dots i.bl{ left: calc(var(--rail) - 3px); bottom: 14px; }
.corner-dots i.br{ right: calc(var(--rail) - 3px); bottom: 14px; }

/* 內容區 */
.section{
  position: relative;
  padding: 0 var(--content-pad) 64px;
  z-index: 3;
}

/* 頂部橫幅 */
.topbar{
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(5, 5, 5, 0.85);
  backdrop-filter: blur(8px);
  padding: 20px var(--content-pad);
  border-bottom: 1px solid var(--line);
  margin-bottom: 24px;
}
.topbar .brand{
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}
.brand-left{
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.brand-tag{
  font-family: var(--serif);
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
}
.brand-title{
  font-family: var(--serif);
  font-size: 32px;
  letter-spacing: 4px;
  font-weight: 600;
  text-shadow: 0 2px 10px rgba(255,255,255,0.1);
}
.burger{
  width: 44px; height: 44px;
  border: 1px solid var(--line);
  display: grid; place-items: center;
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
  transition: all 0.3s ease;
}
.burger:hover{
  background: rgba(255,255,255,0.05);
  border-color: var(--line-strong);
}
.burger span{
  display: block;
  width: 18px; height: 12px;
  position: relative;
}
.burger span::before,
.burger span::after,
.burger span i{
  content: "";
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: var(--ink);
  opacity: 0.9;
  transition: all 0.3s ease;
}
.burger span::before{ top: 0; }
.burger span i{ top: 50%; transform: translateY(-50%); width: 70%; left: auto; right: 0; }
.burger span::after{ bottom: 0; }
.burger:hover span i{ width: 100%; }

/* 內容導線裝飾 */
.left-rail{
  position: absolute;
  left: calc(var(--rail) + 20px);
  top: 140px;
  bottom: 100px;
  width: 1px;
  background: linear-gradient(to bottom, var(--line), transparent);
  z-index: 2;
  pointer-events: none;
}
.left-rail-dot{
  position: absolute;
  left: calc(var(--rail) + 16px);
  top: 320px;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--ink);
  box-shadow: 0 0 10px rgba(255,255,255,0.5);
  z-index: 3;
  pointer-events: none;
  animation: pulse 3s infinite ease-in-out;
}

/* 十字星動效 */
.star-cross{
  position: absolute;
  right: calc(var(--rail) + 60px);
  top: 180px;
  width: 100px; height: 100px;
  pointer-events: none;
  z-index: 3;
  opacity: 0.8;
  animation: spin 40s linear infinite;
}
.star-cross::before,
.star-cross::after{
  content: "";
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%,-50%);
  background: radial-gradient(circle, var(--ink) 0%, transparent 80%);
}
.star-cross::before{ width: 100%; height: 1px; }
.star-cross::after{ width: 1px; height: 100%; }
.star-cross i{
  position: absolute;
  left: 50%; top: 50%;
  width: 8px; height: 8px;
  transform: translate(-50%,-50%);
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--line-strong);
}

/* 內文標題與主視覺 */
.h1{
  margin-top: 40px;
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  letter-spacing: 2px;
  font-size: 52px;
  line-height: 1.15;
  background: linear-gradient(180deg, #fff 0%, #aaa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle{
  margin-top: 16px;
  font-family: var(--serif);
  font-weight: 300;
  font-size: 26px;
  letter-spacing: 4px;
  color: var(--ink);
  opacity: 0.9;
}
.lead{
  margin-top: 36px;
  color: var(--ink-weak);
  line-height: 2.2;
  font-size: 16px;
  font-weight: 300;
  letter-spacing: 1px;
}
.lead strong{ 
  color: var(--ink); 
  font-weight: 600; 
  text-shadow: 0 0 8px rgba(255,255,255,0.3);
}

/* 極簡分隔線 */
.rule{
  margin: 40px 0;
  height: 1px;
  width: 100%;
  background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
  position: relative;
}
.rule::after{
  content: "✦";
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  color: var(--muted);
  font-size: 10px;
  background: var(--bg);
  padding: 0 10px;
}

/* 按鈕：高級線框 */
.btn{
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border: 1px solid var(--line-strong);
  background: rgba(255,255,255,0.02);
  color: var(--ink);
  padding: 16px 36px;
  font-family: var(--serif);
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  text-decoration: none;
  user-select: none;
  position: relative;
  overflow: hidden;
}
.btn::before{
  content: "";
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: var(--ink);
  transition: left 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  z-index: -1;
}
.btn:hover{
  color: #000;
  border-color: var(--ink);
  box-shadow: 0 0 20px rgba(255,255,255,0.15);
}
.btn:hover::before{
  left: 0;
}
.btn-row{
  display: flex;
  gap: 16px;
  align-items: center;
  margin-top: 24px;
  flex-wrap: wrap;
}
.btn-row .mini{
  padding: 12px 24px;
  font-size: 14px;
  letter-spacing: 2px;
  border-color: var(--line);
  color: var(--muted);
  background: transparent;
}
.btn-row .mini::before{ display: none; }
.btn-row .mini:hover{
  background: rgba(255,255,255,0.05);
  color: var(--ink);
  border-color: var(--line-strong);
  box-shadow: none;
}

/* Quiz */
.meta{
  margin-top: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  color: var(--muted);
  font-family: var(--display);
  font-style: italic;
  letter-spacing: 2px;
}
.progress{
  display: flex;
  gap: 6px;
  margin-top: 16px;
}
.seg{
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,0.08);
  position: relative;
  overflow: hidden;
  border-radius: 2px;
}
.seg::after{
  content: "";
  position: absolute; inset: 0;
  background: var(--ink);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
  box-shadow: 0 0 10px rgba(255,255,255,0.5);
}
.seg.done::after{ transform: scaleX(1); }
.seg.active::after{ transform: scaleX(0.5); opacity: 0.6; animation: pulseGlow 2s infinite; }

.qno{
  margin-top: 40px;
  font-family: var(--display);
  font-style: italic;
  letter-spacing: 4px;
  color: var(--muted);
  font-size: 20px;
  text-align: center;
}
.qtext{
  margin-top: 16px;
  font-size: 22px;
  line-height: 1.8;
  color: var(--ink);
  font-family: var(--serif);
  letter-spacing: 1px;
  text-align: center;
  font-weight: 300;
}

/* 選項：互動感提升 */
.options{
  margin-top: 40px;
  border-top: 1px solid var(--line);
}
.opt{
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  color: var(--ink-weak);
  text-align: left;
  padding: 24px 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  gap: 18px;
  align-items: flex-start;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUpOpt 0.4s ease forwards;
}
/* Staggered animation delays for options */
.opt:nth-child(1) { animation-delay: 0.1s; }
.opt:nth-child(2) { animation-delay: 0.2s; }
.opt:nth-child(3) { animation-delay: 0.3s; }
.opt:nth-child(4) { animation-delay: 0.4s; }

.opt::before{
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--ink);
  transform: scaleY(0);
  transition: transform 0.3s ease;
  transform-origin: center;
}
.opt:hover{ 
  color: var(--ink); 
  background: rgba(255,255,255,0.02);
  padding-left: 24px;
}
.opt:hover::before{ transform: scaleY(1); }
.opt:disabled{ cursor: default; opacity: 0.4; pointer-events: none; }

.bullet{
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  margin-top: 7px;
  flex: 0 0 auto;
  transition: all 0.3s ease;
  position: relative;
}
.bullet::after{
  content: "";
  position: absolute; inset: 2px;
  border-radius: 50%;
  background: var(--ink);
  transform: scale(0);
  transition: transform 0.3s ease;
}
.opt.selected .bullet{ border-color: var(--ink); }
.opt.selected .bullet::after{ transform: scale(1); }
.opt .txt{
  line-height: 1.8;
  font-size: 17px;
  letter-spacing: 0.5px;
}

/* Result */
.result-img-wrap{
  margin-top: 24px;
  border: 1px solid var(--line-strong);
  border-radius: 12px 12px 0 0; /* 調整為更優雅的小圓角 */
  overflow: hidden;
  position: relative;
}
.result-img-wrap::after{
  content: "";
  position: absolute; inset: 0;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
  pointer-events: none;
}
.result-img{
  width: 100%;
  height: auto;
  display: block;
  background: #000;
  transition: transform 0.5s ease;
}
.result-img-wrap:hover .result-img{
  transform: scale(1.02);
}

.result-body{
  margin-top: 32px;
}
.r-eyebrow{
  font-family: var(--display);
  font-style: italic;
  letter-spacing: 3px;
  color: var(--muted);
  font-size: 14px;
}
.r-name{
  margin-top: 12px;
  font-family: var(--serif);
  font-weight: 600;
  font-size: 34px;
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(255,255,255,0.2);
}
.r-desc{
  margin-top: 16px;
  line-height: 2;
  color: var(--ink-weak);
  font-size: 16px;
  letter-spacing: 1px;
}

/* 指標：高級毛玻璃三欄 */
.seals{
  margin-top: 32px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.seal{
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(4px);
  padding: 20px 16px;
  position: relative;
  overflow: hidden;
  text-align: center;
  border-radius: 4px;
}
.seal::before{
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: var(--fill, 50%);
  background: linear-gradient(to top, rgba(255,255,255,0.1), transparent);
  z-index: 0;
}
.seal .lab{
  font-family: var(--display);
  font-style: italic;
  letter-spacing: 2px;
  color: var(--muted);
  font-size: 13px;
  position: relative;
  z-index: 1;
}
.seal .val{
  margin-top: 12px;
  font-family: var(--display);
  font-style: italic;
  color: var(--ink);
  letter-spacing: 2px;
  position: relative;
  z-index: 1;
  font-size: 15px;
  text-shadow: 0 0 8px rgba(255,255,255,0.3);
}

/* Quote / Guide：引言優化 */
.block{
  margin-top: 24px;
  border: 1px solid var(--line);
  background: rgba(0,0,0,0.3);
  padding: 24px;
  position: relative;
}
.block-quote::before{
  content: "“";
  position: absolute;
  top: 10px; left: 16px;
  font-family: var(--display);
  font-size: 60px;
  color: rgba(255,255,255,0.08);
  line-height: 1;
  pointer-events: none;
}
.block .lab{
  font-family: var(--display);
  font-style: italic;
  letter-spacing: 3px;
  color: var(--muted);
  font-size: 13px;
  text-transform: uppercase;
}
.block .txt{
  margin-top: 16px;
  line-height: 2.2;
  color: var(--ink);
  font-size: 16px;
  letter-spacing: 1px;
  font-weight: 300;
  position: relative;
  z-index: 1;
}
.block .txt.muted{ color: var(--ink-weak); }

/* CTA */
.cta{
  margin-top: 24px;
}
.cta a{
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--line-strong);
  background: rgba(255,255,255,0.03);
  color: var(--ink);
  padding: 18px 24px;
  text-decoration: none;
  letter-spacing: 1.5px;
  transition: all 0.3s ease;
  font-weight: 400;
}
.cta a::after{
  content: "→";
  font-family: var(--serif);
  transition: transform 0.3s ease;
}
.cta a:hover{
  background: var(--ink);
  color: #000;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}
.cta a:hover::after{
  transform: translateX(5px);
}

/* Footer stats */
.stats{
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--line);
  color: var(--muted);
  line-height: 2;
  font-size: 14px;
  letter-spacing: 1px;
  text-align: center;
}
.stats strong{ color: var(--ink); font-weight: 600; }

/* 關鍵影格與動畫 */
@keyframes fadeUp { 
  from { opacity: 0; transform: translateY(15px); } 
  to { opacity: 1; transform: translateY(0); } 
}
@keyframes fadeUpOpt { 
  from { opacity: 0; transform: translateY(10px); } 
  to { opacity: 1; transform: translateY(0); } 
}
@keyframes pulse {
  0%, 100% { opacity: 0.6; box-shadow: 0 0 5px rgba(255,255,255,0.3); }
  50% { opacity: 1; box-shadow: 0 0 15px rgba(255,255,255,0.8); }
}
@keyframes pulseGlow {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 5px rgba(255,255,255,0.2); }
  50% { opacity: 0.8; box-shadow: 0 0 12px rgba(255,255,255,0.6); }
}
@keyframes spin { 
  100% { transform: rotate(360deg); } 
}

.in{ animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both; }

/* 小螢幕響應式 */
@media (max-width: 600px){
  :root{
    --content-pad: 24px;
    --rail: 16px;
  }
  .topbar{ padding: 16px var(--content-pad); }
  .brand-title{ font-size: 24px; }
  .h1{ font-size: 40px; }
  .subtitle{ font-size: 20px; }
  .seals{ grid-template-columns: 1fr; gap: 12px; }
  .left-rail{ left: calc(var(--rail) + 12px); }
  .left-rail-dot{ left: calc(var(--rail) + 8px); }
  .star-cross{ right: calc(var(--rail) + 20px); width: 80px; height: 80px; top: 120px; }
  .qtext{ font-size: 19px; }
  .opt{ padding: 20px 12px; }
}
</style>
</head>

<body>
<div id="app">
  <div class="frame" id="frame">
    <div class="corner-dots" aria-hidden="true">
      <i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i>
    </div>

    <div class="left-rail" aria-hidden="true"></div>
    <div class="left-rail-dot" aria-hidden="true"></div>

    <div class="star-cross" aria-hidden="true"><i></i></div>

    <div class="topbar">
      <div class="brand">
        <div class="brand-left">
          <div class="brand-tag">暗黑童話BL合本</div>
          <div class="brand-title">故事另有結局</div>
        </div>
        <button class="burger" type="button" aria-label="menu" onclick="alert('Menu (demo)')">
          <span><i></i></span>
        </button>
      </div>
    </div>

    <section id="intro" class="section in">
      <div class="h1">How will the story end this time?</div>
      <div class="subtitle">你又會有怎樣的故事？</div>

      <div class="rule"></div>

      <p class="lead">
        每個人心裡都藏著一個<strong>不能說出口的偏好</strong>。<br/>
        有人嚮往溫柔，有人沉迷失控。<br/>
        有人渴望被征服，有人其實想掌控一切。
      </p>

      <p class="lead" style="margin-top:16px;">
        這是一場關於<strong>支配、臣服、算計與破壞</strong>的深層試煉。<br/>
        請用直覺回答，別想太多。
      </p>

      <div class="rule"></div>

      <div class="btn-row">
        <button class="btn" type="button" onclick="startQuiz()">墜入深淵</button>
      </div>
    </section>

    <section id="quiz" class="section" style="display:none;">
      <div class="meta">
        <div id="quiz-label">Question I of VIII</div>
        <div id="quiz-hint">Choose by instinct</div>
      </div>

      <div class="progress" id="progress"></div>

      <div class="qno" id="qno">— I —</div>
      <div class="qtext" id="qtext"></div>

      <div class="options" id="options"></div>

      <div class="btn-row" style="margin-top:24px; justify-content: center;">
        <button class="btn mini" type="button" onclick="location.reload()">重新開始</button>
      </div>
    </section>

    <section id="result" class="section" style="display:none;">
      <div class="result-img-wrap in">
        <img id="result-img" class="result-img" src="" alt="結果圖" />
      </div>

      <div class="result-body in" style="animation-delay: 0.2s;">
        <div class="r-eyebrow">Soul Specimen Revealed</div>
        <div class="r-name" id="r-name">【—】</div>
        <div class="r-desc" id="r-desc"></div>

        <div class="seals" id="seals"></div>

        <div class="block block-quote">
          <div class="lab">專屬台詞</div>
          <div class="txt" id="r-quote"></div>
        </div>

        <div class="block">
          <div class="lab">Prophecy</div>
          <div class="txt muted" id="r-guide"></div>
          <div class="cta" id="r-cta"></div>
        </div>

        <div class="stats" id="stats">
          ✦ 正在讀取深淵數據⋯
        </div>

        <div class="btn-row" style="margin-top:32px; justify-content: center;">
          <button class="btn" type="button" onclick="location.reload()">Re-Enter 再次測驗</button>

/* ========= UI ========= */
const elIntro  = document.getElementById('intro');
const elQuiz   = document.getElementById('quiz');
const elResult = document.getElementById('result');

const elProgress = document.getElementById('progress');
const elLabel    = document.getElementById('quiz-label');
const elQno      = document.getElementById('qno');
const elQtext    = document.getElementById('qtext');
const elOptions  = document.getElementById('options');

function startQuiz(){
  elIntro.style.display = 'none';
  elResult.style.display = 'none';
  elQuiz.style.display = 'block';
  elQuiz.classList.add('in');

  qi = 0;
  AXES.forEach(k => axesScore[k] = 0);

  // build progress
  elProgress.innerHTML = '';
  for(let i=0;i<questions.length;i++){
    const d = document.createElement('div');
    d.className = 'seg';
    elProgress.appendChild(d);
  }

  showQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
}

function updateProgress(){
  const segs = document.querySelectorAll('.seg');
  segs.forEach((s, idx) => {
    s.classList.remove('done','active');
    if(idx < qi) s.classList.add('done');
    else if(idx === qi) s.classList.add('active');
  });

  elLabel.textContent = `Question ${ROMAN[qi]} of ${ROMAN[questions.length-1]}`;
  elQno.textContent = `— ${ROMAN[qi]} —`;
}

function showQuestion(){
  updateProgress();
  const q = questions[qi];

  // 加入淡入動畫重置
  elQtext.style.animation = 'none';
  elQtext.offsetHeight; /* trigger reflow */
  elQtext.style.animation = 'fadeUp 0.5s ease both';
  elQtext.textContent = q.text;

  elOptions.innerHTML = '';
  q.options.forEach((opt) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.type = 'button';
    btn.innerHTML = `<span class="bullet"></span><span class="txt">${opt.text}</span>`;
    btn.onclick = () => pick(opt.add, btn);
    elOptions.appendChild(btn);
  });
}

function addAxisScores(obj){
  for(const k in obj){
    if(Object.prototype.hasOwnProperty.call(axesScore, k)){
      axesScore[k] += obj[k];
    }
  }
}

function pick(addObj, btn){
  // lock
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  btn.classList.add('selected');
  addAxisScores(addObj);

  setTimeout(()=>{
    qi++;
    if(qi < questions.length) showQuestion();
    else showResult();
  }, 400); // 稍微加長延遲讓使用者看清楚自己選了什麼
}

/* ========= RESULT LOGIC ========= */
function determineResultKey(){
  const {dom,sub,control,manip,chaos,devotion} = axesScore;
  const diff = dom-sub;
  const stance = diff>=2 ? "dom" : diff<=-2 ? "sub" : "switch";
  const secondary = [
    {k:"control",v:control},{k:"manip",v:manip},{k:"chaos",v:chaos},{k:"devotion",v:devotion}
  ].sort((a,b)=>b.v-a.v)[0].k;

  const veryChaos = chaos>=7, veryControl=control>=7, veryManip=manip>=7, veryDevotion=devotion>=7;

  if(veryChaos && sub>=dom)  return "病態攻 × 斯德哥爾摩受";
  if(veryChaos && dom>sub)   return "無情獸群攻 × 自毀抹布受";
  if(veryManip || (secondary==="manip" && manip>=5)) return "腹黑勢利攻 × 卑劣淫蕩受";
  if(veryControl || (secondary==="control" && control>=5)){
    if(stance==="sub" || devotion>=6) return "佔有囚禁攻 × 自願沉淪受";
    if(chaos>=5) return "黑化掠奪攻 × 清冷自持受";
    return "陰鬱偏執攻 × 陽光直男受";
  }
  if(veryDevotion || (secondary==="devotion" && devotion>=5)){
    if(stance==="dom") return "二哈黑龍攻 × 人妻王子受";
    return "佔有囚禁攻 × 自願沉淪受";
  }
  if(stance==="dom") return chaos>=5 ? "暴力黑獅攻 × 冰山白神攻" : "陰鬱偏執攻 × 陽光直男受";
  if(stance==="sub") return control>=4 ? "偏執瘋子攻 × 廢物美人受" : "放蕩影子攻 × 禁慾學者受";
  return chaos>=5 ? "暴力黑獅攻 × 冰山白神攻" : "放蕩影子攻 × 禁慾學者受";
}

      <div class="val">${r.attrVal}</div>
    </div>
    <div class="seal" style="--fill:30%">
      <div class="lab">逃脫機率</div>
      <div class="val">${r.escape}</div>
    </div>
  `;

  // CTA
  const cta = document.getElementById('r-cta');
  cta.innerHTML = `
    <a href="${r.link}" target="_blank" rel="noopener">
      <span>解鎖你的故事樣本：${r.bookName}</span>
    </a>
  `;

  // stats
  sendStats(key);

  window.scrollTo({top:0, behavior:'smooth'});
}

function sendStats(key){
  const stats = document.getElementById('stats');
  if(GAS_URL==="在此貼上你的_GAS_網址"){
    stats.textContent = "✦ 尚未串接資料庫，僅顯示本地結果。";
    return;
  }
  fetch(`${GAS_URL}?result=${encodeURIComponent(key)}`)
    .then(r=>r.json())
    .then(data=>{
      if(data.status==="success"){
        const uc = data.stats[key] || 1;
        const pct = ((uc/data.total)*100).toFixed(1);
        stats.innerHTML = `✦ 目前共有 <strong>${data.total}</strong> 個靈魂墜入深淵。與你同類的人約佔 <strong>${pct}%</strong>。`;
      } else {
        stats.textContent = "✦ 數據讀取失敗，但深淵已記住你的選擇。";
      }
    })
    .catch(()=>{
      stats.textContent = "✦ 數據讀取失敗，但深淵已記住你的選擇。";
    });
}

/* ========= UTIL ========= */
function copyResult(){
  const name = document.getElementById('r-name').textContent || '';
  const desc = document.getElementById('r-desc').textContent || '';
  const quote = document.getElementById('r-quote').textContent || '';
  const text = `${name}\n${desc}\n\n「${quote}」`;
  navigator.clipboard.writeText(text).then(()=>{
    alert('已成功複製結果，快去和朋友分享你的黑暗特質吧！');
  }).catch(()=>{
    alert('複製失敗，請手動複製');
  });
}
</script>
