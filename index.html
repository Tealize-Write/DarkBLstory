        update() { this.y -= this.speedY; if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; } }
        draw() { ctx.fillStyle = `rgba(79, 172, 254, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    function initParticles() { particlesArray = []; let numberOfParticles = (canvas.width * canvas.height) / 9000; for (let i = 0; i < numberOfParticles; i++) { particlesArray.push(new Particle()); } }
    function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); particlesArray[i].draw(); } requestAnimationFrame(animateParticles); }

            text: "Q5. 如果這是一場註定無法逃脫的遊戲，你渴望的結局是：",
            options: [
                { text: "兩敗俱傷，在毀滅與血泊中交換最後一個吻。", scores: ["無情獸群攻 × 自毀抹布受", "暴力黑獅攻 × 冰山白神受", "黑化掠奪攻 × 清冷自持受"] },
                { text: "互相利用，在慾望與利益的泥沼裡一起沉淪。", scores: ["腹黑勢利攻 × 卑劣淫蕩受", "放蕩影子攻 × 禁慾學者受"] },
                { text: "你徹底被折斷羽翼，成為他專屬的金絲雀。", scores: ["陰鬱偏執攻 × 陽光直男受", "偏執瘋子攻 × 廢物美人受", "佔有囚禁攻 × 自願沉淪受"] },
                { text: "痛與愛混淆，你心甘情願為他戴上鎖鏈。", scores: ["病態攻 × 斯德哥爾摩受", "二哈黑龍攻 × 人妻王子受"] }
            ]
        }
    ];

    let currentQuestionIndex = 0;
    let userScores = {};

    function startQuiz() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById('question-text').innerText = q.text;
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = ''; 
        
        q.options.forEach(option => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option.text;
            btn.onclick = () => selectOption(option.scores);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(scoresArray) {
        scoresArray.forEach(key => {
            if (!userScores[key]) userScores[key] = 0;
            userScores[key]++;
        });
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        // 找出最高分的選項 (同分隨機)
        let maxScore = Math.max(...Object.values(userScores));
        let topKeys = Object.keys(userScores).filter(k => userScores[k] === maxScore);
        let finalResultKey = topKeys[Math.floor(Math.random() * topKeys.length)];
        let result = resultsData[finalResultKey];

        // 圖片替換
        document.getElementById('final-result-img').src = result.image;

        // 🚀 動態生成排版內容 🚀
        document.getElementById('result-content').innerHTML = `
            <div class="result-title">你的靈魂屬性：【${result.soulName}】</div>
            <p class="result-desc">—— ${result.soulDesc}</p>
            
            <div class="result-stats">
                <div>危險指數： ${result.danger}</div>
                <div>${result.attrName}： ${result.attrValue}</div>
                <div>逃脫機率： ${result.escape}</div>
            </div>

            <div class="result-quote">
                <div class="quote-title">💬 專屬台詞：</div>
                <div class="quote-text">「${result.quote}」</div>
            </div>

            <div class="result-guide">
                <div class="guide-title">📖 宿命指引（導流入口）：</div>
                <div class="guide-text">${result.guide}</div>
                <a href="${result.link}" target="_blank" class="novel-link-btn">👉 點此閱讀專屬你的故事：《${result.bookName}》</a>
            </div>
        `;

        sendToGoogleSheets(finalResultKey);
    }

    function sendToGoogleSheets(resultKey) {
        if (GAS_URL === "在此貼上你的_GAS_網址") {
            document.getElementById('stats-content').innerHTML = "⚠️ 尚未串接資料庫，僅顯示本地結果。";
            return;
        }

        fetch(`${GAS_URL}?result=${encodeURIComponent(resultKey)}`)
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    let userCount = data.stats[resultKey] || 1;
                    let percentage = ((userCount / data.total) * 100).toFixed(1);
                    document.getElementById('stats-content').innerHTML = `
                        <p style="color: #a0c4ff; margin:0 0 5px 0;">目前共有 <strong style="color: #fff; font-size:1.2em;">${data.total}</strong> 個靈魂墜入深淵。</p>
                        <p style="color: #a0c4ff; margin:0;">與你一樣對 <strong>${resultKey}</strong> 上癮的人約佔 <strong style="color: #00f2fe; font-size:1.2em;">${percentage}%</strong>。</p>
                    `;
                }
            })
            .catch(error => {
                document.getElementById('stats-content').innerHTML = "數據讀取失敗，但深淵已記住你的選擇。";
            });
    }
</script>

</body>
</html>
