<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>故事另有結局｜黑暗特質心理測驗</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#000;
  --ink:#fff;
  --ink-weak:#a0a0a0;
  --line:rgba(255,255,255,.22);
  --line-strong:rgba(255,255,255,.65);
  --muted:rgba(255,255,255,.42);
  --serif:'Noto Serif TC',serif;
  --display:'Noto Serif TC',serif;
  --content-pad:48px;
  --maxw:720px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--serif);
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  -webkit-font-smoothing:antialiased;
}

/* ══ FIXED ART DECO OVERLAYS ══ */
.art-layer{
  position:fixed;inset:0;
  pointer-events:none;z-index:50;
  /* 統一用 currentColor 控色，改這裡就全改 */
  color:var(--ink);
}
.art-layer svg{ overflow:visible; }
.art-tl{position:absolute;top:0;left:0;width:180px;height:180px;}
.art-tl svg{width:100%;height:100%;}
.art-bl{position:absolute;bottom:0;left:0;width:220px;height:220px;}
.art-bl svg{width:100%;height:100%;}
.art-tr{position:absolute;top:0;right:0;width:220px;height:220px;}
.art-tr svg{width:100%;height:100%;}

/* ══ APP LAYOUT ══ */
#app{
  width:100%;max-width:var(--maxw);
  padding:80px 24px 120px;
  position:relative;z-index:10;
}
.section{
  position:relative;
  padding:0 var(--content-pad) 64px;
}

/* ══ TITLE AREA ══ */
.title-wrap{
  position:relative;
  margin-top:60px;margin-bottom:40px;
  padding:40px 0;
  display:flex;justify-content:center;
}
.h1{
  font-family:var(--display);
  font-style:normal;font-weight:700;
  font-size:30px;line-height:1.1;font-weight:700;
  color:transparent;
  -webkit-text-stroke:1px var(--ink);
  text-align:left;position:relative;z-index:2;
}
.subtitle{
  margin-top:16px;
  font-family:var(--serif);font-weight:500;
  font-size:20px;letter-spacing:6px;
  text-align:center;
}
.lead{
  margin-top:32px;
  color:var(--ink-weak);line-height:2.4;
  font-size:15px;font-weight:500;letter-spacing:1.5px;text-align:center;
}
.lead strong{color:var(--ink);font-weight:700;}
.lead+.lead{margin-top:20px;}

/* Title SVG decorations */
.title-deco-left{
  position:absolute;left:-20px;top:0;
  width:80px;height:220px;pointer-events:none;
}
.title-deco-right{
  position:absolute;right:-80px;top:10px;
  width:140px;height:200px;pointer-events:none;
}

/* ══ BANNER (全寬，黑白) ══ */
.banner-wrap{
  margin:0 calc(-1 * var(--content-pad));
  position:relative;overflow:hidden;
  aspect-ratio:2400/900;
}
.banner-wrap img{
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  display:block;
  filter:brightness(.78) saturate(0) contrast(1.05);
}
.banner-wrap::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.9) 100%);
}
.banner-caption{
  position:absolute;bottom:18px;right:20px;z-index:2;
  font-family:var(--display);font-style:italic;
  font-size:10px;letter-spacing:5px;color:rgba(255,255,255,.78);
  text-transform:uppercase;
}

/* ══ DIVIDER ══ */
.rule{
  margin:38px auto;height:1px;width:40%;
  background:var(--line);position:relative;
}
.rule::after{
  content:"✦";
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  color:var(--ink);font-size:11px;
  background:var(--bg);padding:0 14px;
}

/* ══ BUTTONS ══ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:12px;
  border:1px solid var(--ink);
  background:var(--bg);color:var(--ink);
  padding:18px 42px;
  font-family:var(--serif);letter-spacing:4px;font-size:14px;
  cursor:pointer;transition:all .25s ease;
  text-decoration:none;user-select:none;
  text-transform:uppercase;
}
.btn:hover{background:var(--ink);color:var(--bg);}
.btn-row{
  display:flex;gap:16px;align-items:center;
  justify-content:center;margin-top:32px;flex-wrap:wrap;
}
.btn.mini{
  padding:11px 24px;font-size:13px;letter-spacing:3px;
  border-color:var(--line-strong);color:var(--ink-weak);
}
.btn.mini:hover{background:var(--ink);color:var(--bg);border-color:var(--ink);}

/* ══ SKIP BUTTON ══ */
.skip-btn{
  background:transparent;border:none;
  color:rgba(255,255,255,.78);
  font-family:var(--display);font-style:italic;
  font-size:12px;letter-spacing:3px;
  cursor:pointer;padding:4px 0;
  transition:color .2s ease;
  user-select:none;
}
.skip-btn:hover{color:var(--ink);}

/* ══ QUIZ ══ */
.meta{
  margin-top:24px;
  display:flex;align-items:center;justify-content:space-between;
  color:rgba(255,255,255,.78);
  font-family:var(--display);font-style:italic;letter-spacing:2px;
  font-size:10px;
  border-bottom:1px solid var(--line);padding-bottom:12px;
}
.progress{display:flex;gap:4px;margin-top:2px;}
.seg{
  flex:1;height:1px;
  background:transparent;
  border-top:1px dashed var(--line);
  position:relative;
}
.seg.done{border-top-style:solid;border-color:var(--ink);}
.seg.active{border-top-style:solid;border-color:var(--ink-weak);}

.qno{
  margin-top:60px;
  font-family:var(--display);font-style:italic;
  letter-spacing:6px;color:var(--ink-weak);font-size:18px;text-align:center;
}
.qtext{
  margin-top:20px;
  font-size:18px;line-height:1.85;letter-spacing:1px;
  font-family:var(--serif);letter-spacing:2px;
  text-align:center;font-weight:500;
  min-height:60px;
}

/* ── 選項：打字機風格，無框線 ── */
.options{
  margin-top:48px;
  /* 無頂部border，無框框 */
}
.opt{
  width:100%;background:transparent;border:none;
  color:var(--ink-weak);text-align:left;
  padding:16px 0;cursor:pointer;
  transition:color .2s ease, padding-left .2s ease;
  display:flex;gap:20px;align-items:flex-start;
  /* 打字機：預設隱藏，JS控制顯現 */
  opacity:0;
}
.opt.visible{
  animation:optFadeIn .3s ease forwards;
}
.opt:hover{color:var(--ink);padding-left:10px;}
.opt:disabled{cursor:default;opacity:.28!important;pointer-events:none;}
.opt.selected{color:var(--ink);}

/* 菱形 bullet */
.bullet{
  width:7px;height:7px;
  border:1px solid var(--line-strong);
  margin-top:10px;flex:0 0 auto;
  transform:rotate(45deg);
  transition:all .2s ease;
}
.opt:hover .bullet,.opt.selected .bullet{
  background:var(--ink);border-color:var(--ink);
  transform:rotate(45deg) scale(1.25);
}
.opt .txt{line-height:1.9;font-size:18px;letter-spacing:1px;}

/* 打字機動畫：每個選項依序淡入（間隔由 JS 控制） */
@keyframes optFadeIn{
  from{opacity:0;transform:translateY(6px);filter:blur(.8px);}
  to{opacity:1;transform:translateY(0);filter:blur(0);}
}

/* ══ BACK BUTTON (quiz left-top) ══ */
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;border:none;
  color:rgba(255,255,255,.78);cursor:pointer;
  font-family:var(--display);font-style:italic;
  font-size:13px;letter-spacing:2px;
  padding:0;margin-bottom:24px;
  transition:color .2s ease;
}
.back-btn:hover{color:var(--ink);}
.back-btn svg{
  width:18px;height:18px;
  transition:transform .2s ease;
}
.back-btn:hover svg{transform:translateX(-3px);}

/* ══ RESULT ══ */
/* 上方：圖＋基本資訊並排 */
.result-hero{
  display:grid;
  grid-template-columns:160px 1fr;
  gap:20px;
  align-items:start;
  margin-top:16px;
}
.result-img-wrap{
  border-radius:60px;
  overflow:hidden;
  background:#fff;
  flex-shrink:0;
  aspect-ratio:3/4;
}
.result-img{
  width:100%;height:100%;display:block;
  object-fit:cover;
  object-position:top center;
  filter:none;background:#fff;
}
.result-hero-info{
  padding-top:2px;
}

.result-body{margin-top:24px;text-align:center;}
.r-eyebrow{
  font-family:var(--display);font-style:italic;
  letter-spacing:4px;color:rgba(255,255,255,.78);
  font-size:11px;text-transform:uppercase;
}
.r-name{
  margin-top:10px;
  font-family:var(--serif);font-weight:700;
  font-size:24px;letter-spacing:1px;
  text-align:left;line-height:1.4;
}
.r-compound{
  margin-top:6px;
  font-family:var(--display);font-style:italic;
  font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.78);
  text-align:left;
}
.r-desc{
  margin-top:12px;line-height:2;
  color:var(--ink-weak);font-size:18px;letter-spacing:.5px;
  text-align:left;
}

/* ══ GOTHIC SEALS ══ */
.seals{
  margin-top:24px;
  display:flex;flex-direction:column;gap:0;
  border:1px solid var(--line);
}
.stats .seals{
  border-style:dotted;
  border-color:var(--line-strong);
}
.seal{
  padding:15px 18px;
  border-bottom:1px solid var(--line);
  display:grid;
  grid-template-columns:72px 1fr 52px;
  align-items:center;gap:14px;
}
.seal:last-child{border-bottom:none;}
.seal .lab{
  font-family:var(--display);font-style:italic;
  letter-spacing:1.5px;color:rgba(255,255,255,.78);font-size:11px;
  white-space:nowrap;
}
/* 刻度尺 */
.seal-ruler{
  position:relative;height:14px;
  display:flex;align-items:center;
}
.seal-ruler-track{
  position:absolute;left:0;right:0;height:1px;
  background:rgba(255,255,255,.12);
}
.seal-ruler-ticks{
  position:absolute;left:0;right:0;
  display:flex;justify-content:space-between;
}
.seal-ruler-ticks span{
  display:block;width:1px;height:5px;
  background:rgba(255,255,255,.2);
}
.seal-ruler-fill{
  position:absolute;left:0;height:1px;
  background:var(--ink);
  transition:width 1.3s cubic-bezier(.22,1,.36,1);
  width:0;
}
.seal-ruler-pointer{
  position:absolute;top:50%;
  width:7px;height:7px;
  border:1px solid var(--ink);
  transform:translateY(-50%) rotate(45deg);
  background:var(--bg);
  transition:left 1.3s cubic-bezier(.22,1,.36,1);
  left:0;
}
/* 右側數值：純文字，不重複 ▮ */
.seal .val{
  font-family:var(--display);font-style:italic;
  color:var(--ink);letter-spacing:1px;font-size:12px;
  text-align:right;white-space:nowrap;
}

/* 台詞 / 預言 block */
.block{
  margin-top:28px;border:1px solid var(--line);
  padding:28px 22px;position:relative;text-align:left;
}
.block::before{
  content:"✦";
  position:absolute;top:-8px;left:22px;
  background:var(--bg);padding:0 8px;
  font-size:10px;color:var(--ink);
}
.block .lab{
  font-family:var(--display);font-style:italic;
  letter-spacing:3px;color:rgba(255,255,255,.78);
  font-size:12px;text-transform:uppercase;margin-bottom:14px;
}
.block .txt{
  line-height:2.4;color:var(--ink);
  font-size:15px;letter-spacing:1.5px;font-weight:500;
}
.block .txt.muted{color:var(--ink-weak);}

/* CTA link */
.cta{margin-top:28px;}
.cta a{
  display:flex;align-items:center;justify-content:space-between;
  border:1px solid var(--ink);color:var(--ink);
  padding:18px 22px;text-decoration:none;
  letter-spacing:2px;font-size:14px;
  transition:all .25s ease;text-transform:uppercase;
}
.cta a::after{content:"→";transition:transform .25s ease;}
.cta a:hover{background:var(--ink);color:var(--bg);}
.cta a:hover::after{transform:translateX(5px);}

/* Stats */
.stats{
  margin-top:44px;padding-top:22px;
  border-top:1px dotted var(--line-strong);
  color:rgba(255,255,255,.78);line-height:2;
  font-size:13px;letter-spacing:1.5px;text-align:center;
}
.stats strong{color:var(--ink);font-weight:700;}

/* ══ ANIMATIONS ══ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}
.in{animation:fadeUp .7s cubic-bezier(.2,.8,.2,1) both;}

/* ══ UTILS ══ */
.hidden{display:none!important;}

/* ══ 中間尺寸：兩欄開始擠時提早換單欄 ══ */
@media(max-width:560px){
  .result-hero{
    grid-template-columns:1fr;
    gap:16px;
  }
  /* 手機單欄：圖片全寬，保持正確比例 */
  .result-img-wrap{
    width:100%;
    max-width:100%;
    border-radius:60px;
    /* 保持原圖 1000×1343 的比例完整顯示 */
    aspect-ratio:1000/1343;
  }
  .result-img{
    object-fit:contain;
    object-position:top center;
  }
  .r-name{font-size:18px;}
  .r-desc{font-size:14px;}
  .qtext{font-size:14px;}
  .opt .txt{font-size:14px;}
}

/* ══ AUDIO TOGGLE（嵌入右上月亮圓心） ══ */
#audio-btn{
  position:fixed;   /* JS 動態設 top/right，不用 absolute */
  top:0; right:0;   /* 初始佔位，JS 載入後覆蓋 */
  z-index:220;
  pointer-events:auto;
  background:transparent;
  border:none;
  width:36px;height:36px;
  padding:0;
  cursor:pointer;
  color:var(--ink);
  /* 初始隱藏，等 JS 定位後顯示，避免閃爍 */
  visibility:hidden;
}
/* wrapper：relative 容器，兩個 svg 絕對疊在同一位置 */
.audio-icon-wrap{
  position:relative;
  width:26px;height:26px;
}
#audio-btn svg{
  position:absolute;
  top:0; left:0;
  width:26px;height:26px;
  display:block;
  transition:opacity .15s ease;
}

/* 兩圖示切換：opacity 疊加，不佔流 */
.icon-bars  { opacity:1; }
.icon-note  { opacity:0; }
#audio-btn.muted .icon-bars { opacity:0; }
#audio-btn.muted .icon-note { opacity:1; }

/* 聲波跳動（僅播放中） */
#audio-btn:not(.muted) .bar1{ animation:barPulse 1.1s ease-in-out infinite; }
#audio-btn:not(.muted) .bar2{ animation:barPulse 1.1s ease-in-out .18s infinite; }
#audio-btn:not(.muted) .bar3{ animation:barPulse 1.1s ease-in-out .36s infinite; }
@keyframes barPulse{
  0%,100%{ transform:scaleY(1);  }
  50%    { transform:scaleY(1.8);}
}

/* nudge：進頁面時音符閃白光 */
#audio-btn.nudge{ animation:nudgeGlow 1.6s ease 1; }
@keyframes nudgeGlow{
  0%,100%{ filter:none;                                      color:var(--ink); }
  40%    { filter:drop-shadow(0 0 8px rgba(255,255,255,.9)); color:#fff;       }
}

/* BGM 提示文字 */
#audio-hint{
  position:fixed;
  z-index:260;
  pointer-events:none;
  font-family:var(--display);
  font-style:italic;
  font-size:12px;
  letter-spacing:4px;
  color:#fff;
  /* 黑底 */
  background:rgba(0,0,0,.72);
  padding:7px 14px;
  /* 白色文字光暈 */
  text-shadow:
    0 0 8px rgba(255,255,255,1),
    0 0 18px rgba(255,255,255,.6);
  white-space:nowrap;
  opacity:0;
  transform:translateX(8px);
  transition:opacity .45s ease, transform .45s ease;
}
#audio-hint.show{
  opacity:1;
  transform:translateX(0);
}


/* ══ MOBILE ══ */
@media(max-width:768px){
  :root{--content-pad:22px;}
  .h1{font-size:18px;text-align:center;}
  .title-deco-left{left:0;height:160px;}
  .title-deco-right{right:-16px;height:140px;}
  .title-wrap{padding:20px 0;}
  .art-layer{ opacity:1; transition:opacity .6s ease; }
  /* .art-layer.dim 由 JS 在提示消失後加上 */
  .art-layer.dim{ opacity:.28; }
  .btn-row{flex-direction:column;width:100%;}
  .btn{width:100%;}
  .seal{grid-template-columns:64px 1fr 44px;gap:8px;padding:13px 12px;}
  .seal .lab{font-size:10px;}
  .seal .val{font-size:11px;}
  /* 手機縮小羅盤裝飾，不影響按鈕定位（由 JS 處理） */
  .art-tr{ width:160px; height:160px; }
  .art-bl{ width:160px; height:160px; }
}
</style>
</head>
<body>

<!-- ══ BACKGROUND AUDIO ══ -->
<audio id="bgm" src="sonican-enchanted-fantasy-Music_by_Dvir_Silverstone_from_Pixabay.mp3" loop preload="auto" autoplay></audio>

<!-- ══ SVG SPRITE（隱藏，僅定義圖形） ══ -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>

    <!--
      羅盤原型：viewBox 座標系 220×220
      月亮中心 (60,160)，水平線往右延伸，垂直線往下
    -->
    <symbol id="compass" viewBox="0 0 220 220" overflow="visible">
      <!-- 月亮雙圓環 -->
      <circle cx="60" cy="160" r="38" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="60" cy="160" r="30" fill="none" stroke="currentColor" stroke-width="1"/>
      <!-- 月牙（右側缺口） -->
      <path d="M45,160 A15,15 0 1,1 75,160 A18,18 0 1,0 45,160" fill="currentColor"/>
      <!-- 上方星形指針（朝上） -->
      <polygon points="60,105 62,115 70,117 62,119 60,129 58,119 50,117 58,115" fill="currentColor"/>
      <circle cx="60" cy="100" r="2" fill="currentColor"/>
      <!-- 水平線往右 -->
      <line x1="98" y1="160" x2="220" y2="160" stroke="currentColor" stroke-width="1.2"/>
      <!-- 垂直線往下 -->
      <line x1="60" y1="198" x2="60" y2="220" stroke="currentColor" stroke-width="1.2"/>
      <!-- 水平線刻度裝飾 -->
      <circle cx="104" cy="160" r="3" fill="currentColor"/>
      <path d="M125,156 L130,160 L125,164" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <path d="M132,156 L137,160 L132,164" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <line x1="160" y1="156" x2="160" y2="164" stroke="currentColor" stroke-width="1.5"/>
      <line x1="156" y1="160" x2="164" y2="160" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="210" cy="160" r="4" fill="currentColor"/>
      <!-- 垂直線末端星形裝飾 -->
      <polygon points="60,205 62,208 65,210 62,212 60,215 58,212 55,210 58,208" fill="currentColor"/>
    </symbol>

  </defs>
</svg>

<!-- ══ ART DECO OVERLAYS ══ -->
<!-- aria-hidden 只加在裝飾層，按鈕單獨設定 -->
<!-- ART DECO OVERLAYS -->
<div class="art-layer" aria-hidden="true">
  <div class="art-bl"><svg viewBox="0 0 220 220"><use href="#compass"/></svg></div>
  <div class="art-tr"><svg viewBox="0 0 220 220"><use href="#compass" transform="translate(220,220) scale(-1,-1)"/></svg></div>
</div><!-- /art-layer -->

<!-- AUDIO CONTROLS (outside art-layer) -->
<button id="audio-btn" type="button" aria-label="切換音樂" onclick="toggleAudio()">
  <div class="audio-icon-wrap">
    <svg class="icon-bars" viewBox="0 0 18 18" fill="none">
      <rect class="bar1" x="2" y="7" width="2.2" height="5.5" rx=".6" fill="currentColor" style="transform-origin:3.1px 12.5px"/>
      <rect class="bar2" x="7.9" y="4" width="2.2" height="8.5" rx=".6" fill="currentColor" style="transform-origin:9px 12.5px"/>
      <rect class="bar3" x="13.8" y="7" width="2.2" height="5.5" rx=".6" fill="currentColor" style="transform-origin:14.9px 12.5px"/>
    </svg>

function startQuiz(){

  elQuiz.classList.add('in');

function updateProgress(){
  document.querySelectorAll('.seg').forEach((s,idx)=>{
    s.classList.remove('done','active');
    if(idx<qi) s.classList.add('done');
    else if(idx===qi) s.classList.add('active');
  });
  document.getElementById('quiz-label').textContent=`Question ${ROMAN[qi]} of ${ROMAN[questions.length-1]}`;
  document.getElementById('qno').textContent=`— ${ROMAN[qi]} —`;
}

════════════════════════════════ */
let _twTimer = null;   // 目前打字機 interval
let _twDone  = false;  // 是否已完成

// 立即結束打字機，直接顯示全部
function skipTypewriter(){
  if(_twTimer){ clearInterval(_twTimer); _twTimer=null; }
  _finishTypewriter();
}

// 打字機完成後的共同收尾
function _finishTypewriter(){
  _twDone = true;
  // 隱藏 skip 按鈕
  document.getElementById('skip-wrap').style.display='none';

  // 顯示題目完整文字
  const el = document.getElementById('qtext');
  const q  = questions[qi];
  el.textContent = q.text;

  // 顯示所有選項（依序淡入）
  const opts = document.getElementById('options');
  opts.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';btn.type='button';
    btn.innerHTML=`<span class="bullet"></span><span class="txt">${opt.text}</span>`;
    btn.onclick=()=>pick(opt.add,btn);
    opts.appendChild(btn);
    setTimeout(()=>btn.classList.add('visible'), 60+i*130);
  });
}

function showQuestion(){
  updateProgress();
  _twDone  = false;
  if(_twTimer){ clearInterval(_twTimer); _twTimer=null; }

  const q   = questions[qi];
  const el  = document.getElementById('qtext');
  const skipWrap = document.getElementById('skip-wrap');

  // 清空選項、顯示 skip
  document.getElementById('options').innerHTML='';
  el.textContent='';
  skipWrap.style.display='block';

  // 逐字打字機
  const chars = q.text.split('');
  let idx = 0;
  _twTimer = setInterval(()=>{
    if(idx < chars.length){
      el.textContent += chars[idx];
      idx++;
    } else {
      clearInterval(_twTimer); _twTimer=null;
      _finishTypewriter();
    }
  }, 38); // 每字間隔 38ms，約 1 秒打 26 字
}

function addAxisScores(obj){
  for(const k in obj)
    if(Object.prototype.hasOwnProperty.call(axesScore,k)) axesScore[k]+=obj[k];
}

function pick(addObj,btn){
  // 清掉任何殘留打字機
  if(_twTimer){ clearInterval(_twTimer); _twTimer=null; }
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  btn.classList.add('selected');
  addAxisScores(addObj);
  setTimeout(()=>{ qi++; qi<questions.length?showQuestion():showResult(); },380);
}

/* ════════════════════════════════
   RESULT LOGIC（短代碼）
════════════════════════════════ */
function determineResultCode(){
  const { dom, sub, control, manip, chaos, devotion } = axesScore;

  // 1) 角色：同分時隨機（12題架構已保證 dom/sub 平衡，不再硬偏攻）
  let role = (dom > sub) ? "A" : (sub > dom ? "R" : (Math.random() < 0.5 ? "A" : "R"));

  // 2) core 軸（四大，取最高）
  const core = [
    ["CONTROL",  control],
    ["SCHEME",   manip],
    ["CHAOS",    chaos],
    ["DEVOTION", devotion],
  ].sort((a,b) => b[1] - a[1]);

  const core1    = core[0][0];
  const core2    = core[1][0];
  const core1Val = core[0][1];

  // 3) 強度分段（12 題下 core 最大 12）
  //    0-4: LOW  5-8: MID  9-12: HIGH
  const tier = (core1Val >= 9) ? "HIGH" : (core1Val >= 5 ? "MID" : "LOW");

  return mapToResult(role, core1, core2, tier);
}

function mapToResult(role, core1, core2, tier){
  const tIdx = (tier === "HIGH") ? 2 : (tier === "MID" ? 1 : 0);

  // ── A side (11) ──────────────────────────────
  if(role === "A"){
    if(core1 === "CONTROL"){
      if(tIdx === 2) return "A_CONTROL_3";
      if(tIdx === 1) return (core2 === "SCHEME"   ? "A_CONTROL_2" : "A_CONTROL_1");
      return (core2 === "DEVOTION" ? "A_CONTROL_1" : "A_CONTROL_2");
    }
    if(core1 === "SCHEME"){
      if(tIdx === 2) return "A_SCHEME_3";
      if(tIdx === 1) return (core2 === "CONTROL"  ? "A_SCHEME_1" : "A_SCHEME_2");
      return (core2 === "CHAOS"    ? "A_SCHEME_2" : "A_SCHEME_1");
    }
    if(core1 === "CHAOS"){
      if(tIdx === 2) return "A_CHAOS_2";
      return (core2 === "SCHEME"   ? "A_CHAOS_1"  : "A_CHAOS_2");
    }
    if(core1 === "DEVOTION"){
      if(tIdx === 2) return (core2 === "SCHEME"   ? "A_DEVOTION_3" : "A_DEVOTION_2");
      if(tIdx === 1) return "A_DEVOTION_2";
      return "A_DEVOTION_1";
    }
    return "A_CONTROL_1";
  }

  // ── R side (9) ───────────────────────────────
  if(core1 === "CONTROL"){
    if(tIdx === 2) return "R_CONTROL_2";
    if(tIdx === 1) return (core2 === "CHAOS"    ? "R_CONTROL_3" : "R_CONTROL_1");
    return (core2 === "DEVOTION"  ? "R_CONTROL_1" : "R_CONTROL_3");
  }
  if(core1 === "SCHEME"){
    return (core2 === "CHAOS" || tIdx === 2) ? "R_SCHEME_1" : "R_SCHEME_2";
  }
  if(core1 === "CHAOS"){
    return (core2 === "DEVOTION" || tIdx === 2) ? "R_CHAOS_1" : "R_CHAOS_2";
  }
  if(core1 === "DEVOTION"){
    return (core2 === "CONTROL"  || tIdx === 2) ? "R_DEVOTION_2" : "R_DEVOTION_1";
  }
  return "R_CONTROL_1";
}
/* ════════════════════════════════
   SHARED RULER UTILITIES
════════════════════════════════ */
const TICK_COUNT = 10;

function buildRuler(fillPct){
  const numStr = String(fillPct).replace('%','').trim();
  const pct = Math.min(100, Math.max(0, parseFloat(numStr)||0));
  const ticks = Array.from({length:TICK_COUNT+1},()=>'<span></span>').join('');
  return '<div class="seal-ruler">'
    + '<div class="seal-ruler-track"></div>'
    + '<div class="seal-ruler-ticks">' + ticks + '</div>'
    + '<div class="seal-ruler-fill" data-fill="' + pct + '%"></div>'
    + '<div class="seal-ruler-pointer" data-fill="' + pct + '%"></div>'
    + '</div>';
}

function animateRulers(root){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    root.querySelectorAll('.seal-ruler-fill, .seal-ruler-pointer').forEach(el=>{
      const f = el.dataset.fill;
      if(el.classList.contains('seal-ruler-fill')) el.style.width = f;
      if(el.classList.contains('seal-ruler-pointer')) el.style.left = 'calc(' + f + ' - 4px)';
    });
  }));
}

/* ════════════════════════════════
   AXIS MAX（動態計算各軸理論上限）
════════════════════════════════ */
function calcAxisMax(){
  const max={};
  AXES.forEach(a=>max[a]=0);
  questions.forEach(q=>{
    AXES.forEach(a=>{
      let best=0;
      q.options.forEach(o=>{ best=Math.max(best,Number((o.add&&o.add[a])||0)); });
      max[a]+=best;
    });
  });
  return max;
}

      + '<div class="lab">' + (axisLabel[k]||k) + '</div>'
      + buildRuler(pct+'%')
      + '<div class="val">' + v + '</div>'
      + '</div>';
  }).join('');
  el.innerHTML = '<div style="opacity:.9;letter-spacing:2px;font-style:italic;font-size:12px;margin-bottom:4px;">'
    + '✦ 你本次的深淵指紋（三大主軸）'
    + '</div>'
    + '<div class="seals">' + rows + '</div>';
  animateRulers(el);
}

/* ════════════════════════════════
   SHOW RESULT
════════════════════════════════ */
function showResult(){
  elQuiz.classList.add('hidden');
  elIntro.classList.add('hidden');
  elResult.classList.remove('hidden');
  elResult.classList.remove('in');
  void elResult.offsetWidth;
  elResult.classList.add('in');
  const code=determineResultCode();
  _lastResultCode=code;
  const r=resultsData[code];
  if(!r){
    document.getElementById('pop-line').textContent='✦ 深淵暫時找不到你的檔案（結果資料缺漏）。';
    console.error('Missing resultsData for code:',code);
    return;
  }
  const label=(RESULT_META[code]&&RESULT_META[code].label)||code;
  document.getElementById('result-img').src=r.image;
  document.getElementById('r-name').textContent='「'+r.soulName+'」';
  document.getElementById('r-compound').textContent=label;
  document.getElementById('r-desc').textContent=r.soulDesc;
  document.getElementById('r-quote').textContent=r.quote;
  document.getElementById('r-guide').textContent=r.guide;
  document.getElementById('seals').innerHTML=
    '<div class="seal"><div class="lab">危險指數</div>'
    +buildRuler(r.dangerFill)+'<div class="val">'+r.danger+'</div></div>'
    +'<div class="seal"><div class="lab">'+r.attr+'</div>'
    +buildRuler(r.attrFill)+'<div class="val">'+r.attrVal+'</div></div>'
    +'<div class="seal"><div class="lab">逃脱機率</div>'
    +buildRuler(r.escape)+'<div class="val">'+r.escape+'</div></div>';
  animateRulers(document);
  const cta=document.getElementById('r-cta');
  cta.innerHTML='<a href="'+escapeAttr(r.link)+'" target="_blank" rel="noopener noreferrer">'
    +'<span>解鎖你的故事樣本：'+r.bookName+'</span></a>';
  renderMyTopAxes();
  sendStats(code);
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ════════════════════════════════
   STATS（POST）
════════════════════════════════ */
function sendStats(code){
  const line  = document.getElementById('pop-line');
  const chart = document.getElementById('pop-chart');

  if(!GAS_URL || GAS_URL.includes("在此貼上")){
    line.textContent="✦ 尚未串接資料庫，僅顯示本地結果。";
    return;
  }

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ token: GAS_TOKEN, resultCode: code }),
  })
  .then(r => r.json())
  .then(data => {
    if(!data || !data.ok) throw new Error(data && data.error ? data.error : "unknown");
    renderStats(data, code);
  })
  .catch(()=>{
    line.textContent="✦ 數據讀取失敗，但深淵已記住你的選擇。";
    chart.innerHTML="";
  });
}

function renderStats(data, code){
  const line  = document.getElementById('pop-line');
  const chart = document.getElementById('pop-chart');

  const total = Number(data.total)||0;

  // 攻受統計（用 soulName 為主鍵）
  const counts = data.countsByKeyword || data.counts || {};

  const myKeyword = (resultsData[code] && resultsData[code].soulName) || code;
  const myCount   = Number(counts[myKeyword]||0);
  const myPct     = total > 0 ? Number(((myCount/total)*100).toFixed(1)) : 0;

  // 攻受比例行
  const rc    = data.roleCounts || {};
  const aNum  = Number(rc.A||0);
  const rNum  = Number(rc.R||0);
  const aPct  = total > 0 ? Math.round(aNum*1000/total)/10 : 0;
  const rPct  = total > 0 ? Math.round(rNum*1000/total)/10 : 0;

  line.innerHTML =
    '✦ 目前共有 <strong>'+total+'</strong> 個靈魂墮入深淵。'
    +'與你同類（'+myKeyword+'）約佔 <strong>'+myPct+'%</strong>。'
    +'<span style="opacity:.6;font-size:.85em;margin-left:10px;">'
    +'攻 '+aPct+'%　受 '+rPct+'%</span>';

  // Top 5 by keyword
  const items = Object.entries(counts)
    .map(([k,v])=>({k,v:Number(v)||0}))
    .sort((a,b)=>b.v-a.v)
    .slice(0,5);

  const rows = items.map(({k,v})=>{
    const pct  = total>0?(v/total)*100:0;
    const isMe = (k===myKeyword);
    return '<div class="seal" style="'+(isMe?'border-color:rgba(255,255,255,.65);':'')+'">'
      +'<div class="lab">'+(isMe?'✦ ':'')+k+'</div>'
      +buildRuler(pct.toFixed(1)+'%')
      +'<div class="val">'+pct.toFixed(1)+'%</div></div>';
  }).join('');

  chart.innerHTML=
    '<div style="opacity:.9;letter-spacing:2px;font-style:italic;font-size:12px;margin-bottom:4px;margin-top:14px;">'
    +'✦ 全站分佈（Top 5 結局樣本）'
    +'</div><div class="seals">'+rows+'</div>';

  animateRulers(chart);
}

/* ════════════════════════════════
   AUDIO
════════════════════════════════ */
(function(){
  const bgm  = document.getElementById('bgm');
  const btn  = document.getElementById('audio-btn');

  bgm.volume = 0.45;

  // ── 動態定位：art-tr 永遠是 top:0 right:0，直接讀 offsetWidth ──
  // symbol viewBox 220×220，原始月亮圓心在 (60,160)
  // 鏡像後在 art-tr 座標：cx = 220-60 = 160，cy = 220-160 = 60
  // art-tr 貼視窗右上，所以：
  //   top  = art-tr.offsetHeight * (60/220)
  //   right = art-tr.offsetWidth * (60/220)   ← 從右邊數 (220-160)/220 = 60/220
  function positionBtn(){
    const artTr = document.querySelector('.art-tr');
    if(!artTr) return;
    const W  = artTr.offsetWidth;
    const H  = artTr.offsetHeight;
    const cy = H * (55/220);
    const cr = W * (54/220);   // 調小 → 往右
    const hw = (btn.offsetWidth  || 36) / 2;
    const hh = (btn.offsetHeight || 36) / 2;
    btn.style.top        = Math.round(cy - hh) + 'px';
    btn.style.right      = Math.round(cr - hw) + 'px';
    btn.style.left       = '';
    btn.style.visibility = 'visible';
  }

  // 頁面載入 + resize 都重新定位
  window.addEventListener('load',   positionBtn);
  window.addEventListener('resize', positionBtn);
  // 也在 DOMContentLoaded 先跑一次（圖形已在 DOM 中）
  document.addEventListener('DOMContentLoaded', positionBtn);

  // 同步按鈕狀態到實際播放狀態
  function syncBtn(){
    if(bgm.paused){
      btn.classList.add('muted');
      btn.setAttribute('aria-label','開啟音樂');
    } else {
      btn.classList.remove('muted');
      btn.setAttribute('aria-label','關閉音樂');
    }
  }

  // 嘗試播放，靜默失敗（autoplay policy）
  const playPromise = bgm.play();
  if(playPromise !== undefined){
    playPromise
      .then(()=>{ syncBtn(); })
      .catch(()=>{
        btn.classList.add('muted');
        const resumeOnInteract = ()=>{
          bgm.play().then(()=>{ syncBtn(); });
          document.removeEventListener('click',      resumeOnInteract);
          document.removeEventListener('touchstart', resumeOnInteract);
        };
        document.addEventListener('click',      resumeOnInteract);
        document.addEventListener('touchstart', resumeOnInteract);
      });
  }

  // nudge：進頁面 1.2 秒後，音符閃白光 + 提示文字出現
  window.addEventListener('load', ()=>{
    setTimeout(()=>{
      const hint     = document.getElementById('audio-hint');
      const artLayer = document.querySelector('.art-layer');
      const isMobile = window.innerWidth <= 768;

      // 定位提示文字：按鈕左側，往下多偏 14px
      if(hint){
        const btnRect = btn.getBoundingClientRect();
        hint.style.top   = Math.round(btnRect.top + btnRect.height/2 - 8 + 14) + 'px';
        hint.style.right = Math.round(window.innerWidth - btnRect.left + 10) + 'px';
        hint.classList.add('show');
      }

      // 音符同步發白光（不管靜音/播放狀態都閃一次）
      btn.classList.add('nudge');

      // 提示消失
      setTimeout(()=>{ btn.classList.remove('nudge'); }, 1600);
      setTimeout(()=>{
        if(hint) hint.classList.remove('show');
        // 手機：提示消失後才壓暗裝飾圖案
        if(isMobile && artLayer) artLayer.classList.add('dim');
      }, 3200);

    }, 1200);
  });

  window.toggleAudio = function(){
    if(bgm.paused){
      bgm.play().then(()=>syncBtn());
    } else {
      bgm.pause();
      syncBtn();
    }
  };
})();

// XSS 防護：逸出 href 屬性
function escapeAttr(str){
  const s = String(str ?? '');
  return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function copyResult(){
  const code=_lastResultCode||determineResultCode();
  const label=(RESULT_META[code]&&RESULT_META[code].label)||code;
  const name=document.getElementById('r-name').textContent||'';
  const desc=document.getElementById('r-desc').textContent||'';
  const quote=document.getElementById('r-quote').textContent||'';
  const text=`${name}\n類型：${label}\n${desc}\n\n「${quote}」`;
  navigator.clipboard.writeText(text)
    .then(()=>alert('已成功複製結果，快去和朋友分享你的黑暗特質吧！'))
    .catch(()=>alert('複製失敗，請手動複製'));
}
