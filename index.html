<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深淵迴響｜黑暗特質心理測驗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --abyss: #020810;
            --deep: #060f1e;
            --surface: rgba(8, 20, 42, 0.75);
            --blue-glow: #4facfe;
            --cyan: #00f2fe;
            --text: #c8dcf5;
            --muted: #7a9fc2;
            --danger: #fe4f7a;
            --gold: #f5c842;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--abyss);
            color: var(--text);
            font-family: 'Noto Serif TC', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* ── Background layers ── */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }
        #particle-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        .bg-gradient {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(0,60,120,0.35) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(79,172,254,0.12) 0%, transparent 55%),
                radial-gradient(ellipse 100% 100% at 50% 50%, #020d1f 0%, #020810 100%);
        }

        /* Scanline overlay */
        .scanlines {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.07) 2px,
                rgba(0,0,0,0.07) 4px
            );
            opacity: 0.5;
        }

        /* ── Card ── */
        #app {
            position: relative; z-index: 10;
            max-width: 640px; width: 92%;
            margin: 40px auto;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(79,172,254,0.2);
            border-radius: 2px;
            box-shadow:
                0 0 0 1px rgba(79,172,254,0.05),
                0 0 60px rgba(0,80,200,0.2),
                0 40px 80px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Corner decorations */
        #app::before, #app::after {
            content: '';
            position: absolute;
            width: 24px; height: 24px;
            border-color: var(--blue-glow);
            border-style: solid;
            opacity: 0.6;
        }
        #app::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
        #app::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

        .card-inner { padding: 40px 42px 50px; }

        /* ── Top bar ── */
        .top-bar {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(79,172,254,0.12);
        }
        .top-bar-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--blue-glow);
            box-shadow: 0 0 8px var(--blue-glow);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; } 50% { opacity: 0.3; }
        }
        .top-bar-label {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem; letter-spacing: 4px;
            color: var(--muted); text-transform: uppercase;
        }
        .top-bar-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(79,172,254,0.2), transparent); }

        /* ── Cover image ── */
        .cover-wrap {
            position: relative; margin-bottom: 32px;
            border-radius: 2px; overflow: hidden;
        }
        .cover-img, .result-img {
            width: 100%; max-height: 260px; object-fit: cover; display: block;
            filter: brightness(0.85) saturate(1.1);
        }
        .cover-wrap::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(2,8,16,0.9));
        }
        .cover-tag {
            position: absolute; bottom: 16px; left: 0; z-index: 2;
            background: rgba(79,172,254,0.15);
            border: 1px solid rgba(79,172,254,0.4);
            color: var(--blue-glow); font-family: 'Cinzel', serif;
            font-size: 0.6rem; letter-spacing: 3px;
            padding: 4px 14px 4px 0;
        }
        .cover-tag::before {
            content: '';
            display: inline-block; width: 3px; height: 100%;
            background: var(--blue-glow);
            margin-right: 12px; vertical-align: middle;
        }

        /* ── Titles ── */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem; font-weight: 700;
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 0 0 30px rgba(79,172,254,0.6), 0 0 60px rgba(79,172,254,0.2);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        /* ── Body text ── */
        p.intro {
            color: var(--muted);
            font-size: 0.95rem; line-height: 1.9;
            margin-bottom: 14px;
            font-weight: 300;
        }
        p.intro strong { color: var(--text); font-weight: 400; }

        .divider {
            width: 40px; height: 1px;
            background: linear-gradient(90deg, var(--blue-glow), transparent);
            margin: 24px 0;
        }

        /* ── Start button ── */
        .start-btn {
            display: inline-block;
            position: relative;
            padding: 14px 44px;
            background: transparent;
            color: var(--blue-glow);
            border: 1px solid rgba(79,172,254,0.5);
            font-family: 'Cinzel', serif;
            font-size: 0.9rem; letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s ease;
            overflow: hidden;
            margin-top: 8px;
        }
        .start-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(79,172,254,0.15), rgba(0,114,255,0.1));
            opacity: 0; transition: opacity 0.4s;
        }
        .start-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--blue-glow), transparent);
        }
        .start-btn:hover { color: #fff; border-color: var(--blue-glow); box-shadow: 0 0 30px rgba(79,172,254,0.3); }
        .start-btn:hover::before { opacity: 1; }

        .restart-btn {
            display: inline-block;
            padding: 10px 32px;
            background: transparent;
            color: var(--muted);
            border: 1px solid rgba(122,159,194,0.3);
            font-family: 'Cinzel', serif;
            font-size: 0.7rem; letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 28px;
        }
        .restart-btn:hover { color: var(--text); border-color: var(--muted); }

        /* ── Quiz screen ── */
        .progress-bar-wrap {
            display: flex; gap: 6px; margin-bottom: 32px;
        }
        .progress-seg {
            flex: 1; height: 2px;
            background: rgba(79,172,254,0.12);
            border-radius: 1px; overflow: hidden;
        }
        .progress-seg.active { background: rgba(79,172,254,0.3); }
        .progress-seg.done {
            background: var(--blue-glow);
            box-shadow: 0 0 6px rgba(79,172,254,0.6);
        }

        .question-num {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem; letter-spacing: 3px;
            color: var(--blue-glow); margin-bottom: 10px;
            opacity: 0.8;
        }

        #question-text {
            font-size: 1.05rem; line-height: 1.8;
            color: var(--text); font-weight: 400;
            margin-bottom: 28px;
            padding-left: 14px;
            border-left: 2px solid rgba(79,172,254,0.4);
        }

        .option-btn {
            display: block; width: 100%;
            padding: 16px 20px;
            margin: 10px 0;
            background: rgba(4,12,28,0.6);
            color: var(--muted);
            border: 1px solid rgba(79,172,254,0.12);
            border-radius: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-family: 'Noto Serif TC', serif;
            font-size: 0.92rem; line-height: 1.6;
            position: relative; overflow: hidden;
        }
        .option-btn::before {
            content: '';
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 2px;
            background: var(--blue-glow);
            transform: scaleY(0); transform-origin: bottom;
            transition: transform 0.3s ease;
        }
        .option-btn:hover {
            background: rgba(79,172,254,0.08);
            color: #e8f4ff;
            border-color: rgba(79,172,254,0.35);
            padding-left: 26px;
        }
        .option-btn:hover::before { transform: scaleY(1); }

        /* ── Result screen ── */
        .result-header {
            margin-bottom: 24px;
        }
        .result-eyebrow {
            font-family: 'Cinzel', serif;
            font-size: 0.6rem; letter-spacing: 4px;
            color: var(--muted); margin-bottom: 6px;
        }
        .result-soul-name {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem; font-weight: 700;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0,242,254,0.4);
            letter-spacing: 3px; line-height: 1.2;
        }
        .result-soul-desc {
            color: var(--muted); font-size: 0.9rem;
            margin-top: 8px; font-style: italic;
            padding-left: 12px;
            border-left: 2px solid rgba(0,242,254,0.3);
        }

        /* Stats grid */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin: 24px 0;
        }
        .stat-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(79,172,254,0.1);
            padding: 14px 16px;
        }
        .stat-label {
            font-family: 'Cinzel', serif;
            font-size: 0.55rem; letter-spacing: 2px;
            color: var(--muted); margin-bottom: 6px; text-transform: uppercase;
        }
        .stat-value {
            font-size: 0.88rem; color: var(--blue-glow);
            font-family: monospace; letter-spacing: 1px;
        }
        .stat-card.danger .stat-value { color: var(--danger); }
        .stat-card.escape .stat-value { color: var(--gold); }

        /* Quote */
        .quote-block {
            background: rgba(0,0,0,0.35);
            border-left: 3px solid var(--blue-glow);
            padding: 18px 20px;
            margin: 24px 0;
            position: relative;
        }
        .quote-block::before {
            content: '❝';
            position: absolute; top: -10px; left: 14px;
            font-size: 1.5rem; color: var(--blue-glow); opacity: 0.5;
        }
        .quote-label {
            font-family: 'Cinzel', serif; font-size: 0.55rem;
            letter-spacing: 3px; color: var(--muted); margin-bottom: 10px;
        }
        .quote-text {
            color: #e8f4ff; font-size: 0.95rem;
            line-height: 1.8; font-style: italic;
        }

        /* Guide */
        .guide-block {
            border-top: 1px solid rgba(79,172,254,0.1);
            padding-top: 24px; margin-top: 24px;
        }
        .guide-label {
            font-family: 'Cinzel', serif; font-size: 0.6rem;
            letter-spacing: 3px; color: var(--muted); margin-bottom: 10px;
        }
        .guide-text {
            color: var(--muted); font-size: 0.9rem;
            line-height: 1.8; margin-bottom: 18px;
        }
        .novel-link-btn {
            display: block; width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, rgba(79,172,254,0.12), rgba(0,50,100,0.3));
            border: 1px solid rgba(79,172,254,0.35);
            color: var(--blue-glow);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem; letter-spacing: 2px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .novel-link-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(79,172,254,0.2), rgba(0,114,255,0.15));
            opacity: 0; transition: opacity 0.3s;
        }
        .novel-link-btn:hover { color: #fff; box-shadow: 0 0 30px rgba(79,172,254,0.3); }
        .novel-link-btn:hover::before { opacity: 1; }

        /* Stats footer */
        .stats-footer {
            margin-top: 28px; padding-top: 18px;
            border-top: 1px solid rgba(79,172,254,0.1);
            font-size: 0.88rem; color: var(--muted);
        }
        .stats-footer strong { color: var(--text); }

        .hidden { display: none; }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeUp 0.5s ease forwards; }

        @keyframes glitch {
            0%,100% { clip-path: inset(0 0 98% 0); transform: translateX(0); }
            20% { clip-path: inset(30% 0 50% 0); transform: translateX(-4px); }
            40% { clip-path: inset(70% 0 10% 0); transform: translateX(4px); }
            60% { clip-path: inset(10% 0 80% 0); transform: translateX(-2px); }
            80% { clip-path: inset(60% 0 20% 0); transform: translateX(2px); }
        }
    </style>
</head>

const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let pts = [];
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.addEventListener('resize', resize); resize();
class P {
    constructor() { this.reset(true); }
    reset(rand) {
        this.x = Math.random() * canvas.width;
        this.y = rand ? Math.random() * canvas.height : canvas.height + 4;
        this.r = Math.random() * 1.2 + 0.3;
        this.vy = Math.random() * 0.6 + 0.2;
        this.a = Math.random() * 0.45 + 0.05;
        this.flicker = Math.random() * Math.PI * 2;
    }
    update() {
        this.y -= this.vy;
        this.flicker += 0.02;
        if (this.y < -4) this.reset(false);
    }
    draw() {
        ctx.globalAlpha = this.a * (0.8 + 0.2 * Math.sin(this.flicker));
        ctx.fillStyle = '#4facfe';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
    }
}
function init() { pts = []; const n = (canvas.width * canvas.height) / 7000; for(let i=0;i<n;i++) pts.push(new P()); }
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
    pts.forEach(p => { p.update(); p.draw(); });
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
}
init(); loop();
window.addEventListener('resize', init);

let qi = 0, scores = {};

function startQuiz() {
    document.getElementById('intro-screen').classList.add('hidden');
    const qs = document.getElementById('quiz-screen');
    qs.classList.remove('hidden');
    qs.classList.add('animate-in');
    showQuestion();
}

function updateProgress() {
    const segs = document.querySelectorAll('.progress-seg');
    segs.forEach((s,i) => {
        s.classList.remove('active','done');
        if (i < qi) s.classList.add('done');
        else if (i === qi) s.classList.add('active');
    });
    document.getElementById('quiz-label').textContent = `QUESTION ${qi+1} / ${questions.length}`;
    document.getElementById('question-num').textContent = `Q ${String(qi+1).padStart(2,'0')}`;
}

function showQuestion() {
    updateProgress();
    const q = questions[qi];
    document.getElementById('question-text').textContent = q.text;
    const c = document.getElementById('options-container');
    c.innerHTML = '';
    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.style.animationDelay = (i * 0.07) + 's';
        btn.style.animation = 'fadeUp 0.4s ease both';
        btn.style.animationDelay = (i * 0.08) + 's';
        btn.textContent = opt.text;
        btn.onclick = () => pick(opt.scores, btn);
        c.appendChild(btn);
    });
}

function pick(scArr, btn) {
    document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents='none');
    btn.style.background = 'rgba(79,172,254,0.15)';
    btn.style.color = '#fff';
    btn.style.borderColor = 'rgba(79,172,254,0.5)';
    scArr.forEach(k => { scores[k] = (scores[k]||0)+1; });
    setTimeout(() => {
        qi++;
        if (qi < questions.length) showQuestion();
        else showResult();
    }, 320);
}

function showResult() {
    document.getElementById('quiz-screen').classList.add('hidden');
    const rs = document.getElementById('result-screen');
    rs.classList.remove('hidden');
    rs.classList.add('animate-in');

    const max = Math.max(...Object.values(scores));
    const tops = Object.keys(scores).filter(k => scores[k]===max);
    const key = tops[Math.floor(Math.random()*tops.length)];
    const r = resultsData[key];

    document.getElementById('final-result-img').src = r.image;

    document.getElementById('result-content').innerHTML = `
        <div class="result-header">
            <div class="result-eyebrow">YOUR ABYSS PROFILE</div>
            <div class="result-soul-name">${r.soulName}</div>
            <div class="result-soul-desc">${r.soulDesc}</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card danger">
                <div class="stat-label">危險指數</div>
                <div class="stat-value">${r.danger}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">${r.attr}</div>
                <div class="stat-value">${r.attrVal}</div>
            </div>
            <div class="stat-card escape" style="grid-column:span 2">
                <div class="stat-label">逃脫機率</div>
                <div class="stat-value">${r.escape}</div>
            </div>
        </div>

        <div class="quote-block">
            <div class="quote-label">EXCLUSIVE LINE · 專屬台詞</div>
            <div class="quote-text">「${r.quote}」</div>
        </div>

        <div class="guide-block">
            <div class="guide-label">FATE GUIDE · 宿命指引</div>
            <div class="guide-text">${r.guide}</div>
            <a href="${r.link}" target="_blank" class="novel-link-btn">
                ▶ 閱讀專屬你的故事：《${r.bookName}》
            </a>
        </div>
    `;

    sendStats(key);
}

function sendStats(key) {
    if (GAS_URL === "在此貼上你的_GAS_網址") {
        document.getElementById('stats-content').innerHTML =
            '<span style="color:var(--blue-glow);opacity:0.6;">▌</span> 尚未串接資料庫，僅顯示本地結果。';
        return;
    }
    fetch(`${GAS_URL}?result=${encodeURIComponent(key)}`)
        .then(r => r.json())
        .then(data => {
            if (data.status === "success") {
                const uc = data.stats[key]||1;
                const pct = ((uc/data.total)*100).toFixed(1);
                document.getElementById('stats-content').innerHTML = `
                    目前共有 <strong>${data.total}</strong> 個靈魂墜入深淵。
                    與你同類的人約佔 <strong style="color:var(--cyan)">${pct}%</strong>。
                `;
            }
        })
        .catch(() => {
            document.getElementById('stats-content').innerHTML =
                '<span style="color:var(--muted);">數據讀取失敗，但深淵已記住你的選擇。</span>';
        });
}
